<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Counter List HoK</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  background: #1c1c1f;
  font-family: Arial, sans-serif;
  color: #7b7a8e;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.main-box {
  background: #31313c;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid #1c1c1f;
}

.tabs-container {
  padding: 10px;
  background: #31313c;
  border-bottom: 1px solid #1c1c1f;
}

.tabs-wrapper {
  display: flex;
  gap: 10px;
  width: 100%;
  align-items: center;
}

.tabs {
  display: flex;
  flex: 1 1 auto;
  min-width: 0;
  border: 1px solid #444452;
  border-radius: 4px;
  overflow: hidden;
}

.tab {
  flex: 1 1 0;
  min-width: 0;
  text-align: center;
  padding: 8px 10px;
  cursor: pointer;
  border-right: 1px solid #444452;
  background: #31313c;
  font-size: 12px;
  font-weight: 500;
}

.tab:last-child {
  border-right: none;
}

.tab.active {
  color: white;
  background: #4f6edb;
}

.search-box {
  width: 180px;
  flex: 0 0 180px;
}

.search-box input {
  width: 100%;
  padding: 7px 10px;
  border-radius: 4px;
  border: 1px solid #444452;
  background: #282830;
  color: #ccc;
  box-sizing: border-box;
  font-size: 12px;
  outline: none;
}

.search-box input::placeholder {
  color: #777;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed; 
}

thead {
  background: #282830;
}

thead tr {
  border-bottom: 1px solid #1c1c1f;
}

thead th {
  padding: 10px 4px;    
  font-size: 11px;    
  color: #7b7a8e;
  font-weight: bold !important;  
  cursor: pointer;
}

tbody tr {
  background: #31313c;
  border-top: 1px solid #1c1c1f;
  border-bottom: 1px solid #1c1c1f;
}

tbody tr:hover {
  background: #3a3a46;
}

td {
  padding: 8px 4px;   
}

/* Nuevos anchos limpios al remover Tier y Rol */
.col-pos  { width: 6%; text-align: center; }
.col-hero { width: 22%; }
.col-rel  { width: 24%; text-align: center; } 

/* Estilos de fondos solicitados para las celdas de la tabla (Cabecera y Cuerpo) */
.bg-fuerte {
  background-color: rgba(255, 255, 255, 0.03);
}
.bg-debil {
  background-color: rgba(239, 68, 68, 0.12); /* Rojo translúcido */
}
.bg-sinergia {
  background-color: rgba(168, 85, 247, 0.12); /* Lila translúcido */
}

.champion {
  display: flex;
  align-items: center;
  gap: 12px;
  color: white;
  padding-left: 8px;
}

.champion img {
  width: 36px;
  height: 36px;
  border-radius: 6px;
}

.champion span {
  font-size: 11px; 
  font-weight: bold;
}

/* Contenedor de burbujas sin contornos */
.relation-cell {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  flex-wrap: nowrap;
}

/* Círculos más grandes (34px) y sin línea de contorno */
.relation-cell img {
  width: 34px;
  height: 34px;
  border-radius: 50%; 
  object-fit: cover;
  border: none !important; 
}  

.logo-text {
  font-family: monospace;
  font-size: 22px;
  color: white;
  margin-bottom: 10px;
  margin-left: 4px;
  letter-spacing: 1px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.view-tabs {
  display: flex;
  gap: 6px;
}

.view-tab {
  padding: 6px 12px;
  font-size: 12px;
  background: #31313c;
  border: 1px solid #444452;
  cursor: pointer;
  color: #a0a0b5;
  text-decoration: none;
}

.view-tab.active {
  background: #4f6edb;
  color: white;
}

::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: #1c1c1f; }
::-webkit-scrollbar-thumb { background: #444452; border-radius: 6px; }
</style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <div class="logo-text">HoKstats - Matchups</div>

    <div class="view-tabs">
      <a href="index.html" class="view-tab">Estadísticas</a>
      <a href="counter.html" class="view-tab active">Counters</a>
    </div>
  </div>

  <div class="main-box">
    <div class="tabs-container">
      <div class="tabs-wrapper">

        <div class="tabs">
          <div class="tab active" data-role="all">Todo</div>
          <div class="tab" data-role="Choque">Choque</div>
          <div class="tab" data-role="Cazador">Cazador</div>
          <div class="tab" data-role="Medio">Medio</div>
          <div class="tab" data-role="Merodeo">Merodeo</div>
          <div class="tab" data-role="Farmeo">Farmeo</div>
        </div>

        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Buscar héroe...">
        </div>

      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th class="col-pos" onclick="sortTable('pos')">Pos</th>
          <th class="col-hero">Héroe</th>
          
          <th class="col-rel bg-fuerte">Fuerte contra</th>
          <th class="col-rel bg-debil">Débil contra</th>
          <th class="col-rel bg-sinergia">Sinergia con</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
      
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv";

let allData = [];
let currentSort = { key: null, asc: false };
let currentRole = "all";
let currentSearch = "";

function cleanNumber(val){
  if (!val) return 0;
  return parseFloat(val.toString().replace(/,/g, '').replace('%', '').trim()) || 0;
}
  
function parseCSV(text) {
  return Papa.parse(text.trim(), { skipEmptyLines: true }).data;
}

fetch(CSV_URL)
.then(r => r.text())
.then(csv => {
  const data = parseCSV(csv).slice(1);

  data.forEach(cols => {
    if (!cols[1]) return;

    allData.push({
      nombre: cols[1],
      imagen: cols[3],
      // Se siguen extrayendo los roles para que los filtros funcionen perfectamente en segundo plano
      roles: [cols[5], cols[6], cols[7]].filter(Boolean),
      pos: cleanNumber(cols[63]),

      // ⚔️ Fuerte contra (6 Máximos)
      counter: [
        { name: cols[26], img: cols[28] }, 
        { name: cols[29], img: cols[31] }, 
        { name: cols[32], img: cols[34] }, 
        { name: cols[35], img: cols[37] }, 
        { name: cols[38], img: cols[40] }, 
        { name: cols[41], img: cols[43] }  
      ],

      // 🛡️ Débil contra (6 Máximos)
      weak: [
        { name: cols[44], img: cols[46] }, 
        { name: cols[47], img: cols[49] }, 
        { name: cols[50], img: cols[52] }, 
        { name: cols[53], img: cols[55] }, 
        { name: cols[54], img: cols[58] }, 
        { name: cols[59], img: cols[61] }  
      ],

      // 🤝 Sinergia con (5 Máximos)
      syn: [
        { name: cols[11], img: cols[13] }, 
        { name: cols[14], img: cols[16] }, 
        { name: cols[17], img: cols[19] }, 
        { name: cols[20], img: cols[22] }, 
        { name: cols[23], img: cols[25] }  
      ]
    });
  });

  currentSort = { key: 'pos', asc: true };
  allData.sort((a, b) => a.pos - b.pos);

  applyFilters();
});

function renderIcons(arr){
  return arr
    .filter(x => x.img && x.img !== "#N/A" && x.img.trim() !== "")
    .map(x => `<img src="${x.img.trim()}" title="${x.name ? x.name.trim() : ''}">`)
    .join("");
}

function applyFilters() {
  let data = [...allData];

  if (currentRole !== "all") {
    data = data.filter(i => i.roles.includes(currentRole));
  }

  if (currentSearch) {
    data = data.filter(i => i.nombre.toLowerCase().includes(currentSearch));
  }

  renderTable(data);
}

function renderTable(data) {
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach(item => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="col-pos" style="font-size:11px; color:#a0a0b5; text-align:center;">${item.pos}</td>
    
      <td class="col-hero">
        <div class="champion">
          <img src="${item.imagen}">
          <span>${item.nombre}</span>
        </div>
      </td>

      <td class="col-rel bg-fuerte">
        <div class="relation-cell">${renderIcons(item.counter)}</div>
      </td>
      <td class="col-rel bg-debil">
        <div class="relation-cell">${renderIcons(item.weak)}</div>
      </td>
      <td class="col-rel bg-sinergia">
        <div class="relation-cell">${renderIcons(item.syn)}</div>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

/* Eventos Filtros por Rol */
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentRole = tab.dataset.role;
    applyFilters();
  });
});

/* Buscador interactivo */
document.getElementById("searchInput").addEventListener("input", e => {
  currentSearch = e.target.value.toLowerCase();
  applyFilters();
});

/* Algoritmo de ordenamiento por Pos */
function sortTable(key) {
  let asc = false;
  if (currentSort.key === key) {
    asc = !currentSort.asc;
  } else {
    asc = (key === 'pos'); 
  }
  
  currentSort = { key, asc };

  allData.sort((a, b) => {
    return asc ? a[key] - b[key] : b[key] - a[key];
  });

  applyFilters();
}
</script>

</body>
</html>
