<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOKStats | v4.2 Responsive</title>
    <style>
        :root { --bg: #0b0e11; --card: #161b22; --brd: #30363d; --txt: #f0f6fc; --sec: #8b949e; --acc: #58a6ff; }
        body { background: var(--bg); color: var(--txt); font-family: system-ui, -apple-system, sans-serif; padding: 10px; margin: 0; }
        
        .container { max-width: 100%; margin: 0 auto; overflow-x: auto; } /* Permite scroll horizontal en móvil si es necesario */
        
        .header { margin-bottom: 15px; border-left: 4px solid var(--acc); padding-left: 12px; display: flex; align-items: baseline; gap: 8px; }
        .v-badge { background: #238636; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; min-width: 800px; } /* Evita que se rompa el diseño en pantallas muy pequeñas */
        
        th { color: var(--sec); font-size: 10px; text-transform: uppercase; padding: 8px; text-align: left; letter-spacing: 0.5px; white-space: nowrap; }

        /* REDUCCIÓN ESTRATÉGICA DE ESPACIOS */
        .w-hero { width: 180px; } 
        .w-auto { width: auto; } /* Deja que el contenido defina el ancho */

        tr.hero-row td { background: var(--card); padding: 8px 10px; border-top: 1px solid var(--brd); border-bottom: 1px solid var(--brd); vertical-align: middle; }
        tr.hero-row td:first-child { border-left: 1px solid var(--brd); border-radius: 6px 0 0 6px; }
        tr.hero-row td:last-child { border-right: 1px solid var(--brd); border-radius: 0 6px 6px 0; }

        .hero-info { display: flex; align-items: center; gap: 8px; }
        .img-main { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--brd); object-fit: cover; }
        
        /* Iconos de relación ultra compactos con tooltip */
        .img-mini { 
            width: 22px; height: 22px; border-radius: 50%; 
            border: 1px solid var(--brd); object-fit: cover;
            cursor: pointer;
        }

        .name-txt { font-weight: 600; font-size: 13px; color: #fff; display: block; }
        .type-txt, .stat-txt { color: var(--sec); font-size: 11px; font-weight: normal; line-height: 1.2; }

        /* Contenedores flexibles */
        .roles-flex { display: flex; flex-direction: column; justify-content: center; }
        .rel-flex { display: flex; flex-direction: row; gap: 3px; align-items: center; }

        @media (max-width: 600px) {
            body { padding: 5px; }
            .name-txt { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 18px;">HOKStats</h1>
            <span class="v-badge">v4.2</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th class="w-hero">Héroe</th>
                    <th class="w-auto">Roles</th>
                    <th class="w-auto">Win</th>
                    <th class="w-auto">Pick</th>
                    <th class="w-auto">Ban</th>
                    <th class="w-auto">Sinergia</th>
                    <th class="w-auto">Fuerte</th>
                    <th class="w-auto">Débil</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + Date.now();

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').map(line => {
                    const parts = []; let curr = '', q = false;
                    for (let c of line) { if (c === '"') q = !q; else if (c === ',' && !q) { parts.push(curr); curr = ''; } else curr += c; }
                    parts.push(curr); return parts;
                });

                const body = document.getElementById('table-body');
                rows.slice(1).forEach(row => {
                    if (!row[1]) return;

                    const d = {
                        nombre: row[1], img: row[3], tipo: row[4],
                        rol1: row[5], rol2: row[6], rol3: row[7],
                        win: row[8], pick: row[9], ban: row[10],
                        s1_n: row[11], s1_i: row[13], s2_n: row[14], s2_i: row[16],
                        f1_n: row[17], f1_i: row[19], f2_n: row[20], f2_i: row[22],
                        d1_n: row[23], d1_i: row[25], d2_n: row[26], d2_i: row[28]
                    };

                    const clean = (v) => (v && !v.includes('http') && v !== "-" && v !== "0" && v.trim() !== "") ? v.trim() : "";
                    const img = (v) => (v && v.includes('http')) ? v.trim() : "";
                    const relIcon = (n, i) => {
                        const name = clean(n);
                        return name ? `<img src="${img(i)}" class="img-mini" title="${name}" alt="${name}" onerror="this.style.display='none'">` : "";
                    };

                    const roles = [clean(d.rol1), clean(d.rol2), clean(d.rol3)].filter(r => r !== "").join('<br>');

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.innerHTML = `
                        <td>
                            <div class="hero-info">
                                <img src="${img(d.img)}" class="img-main" onerror="this.src='https://www.honorofkings.com/global/images/hero/hero_list_default.png'">
                                <div><span class="name-txt">${d.nombre}</span><span class="type-txt">${clean(d.tipo)}</span></div>
                            </div>
                        </td>
                        <td><div class="roles-flex stat-txt">${roles}</div></td>
                        <td><span class="stat-txt">${clean(d.win)}</span></td>
                        <td><span class="stat-txt">${clean(d.pick)}</span></td>
                        <td><span class="stat-txt">${clean(d.ban)}</span></td>
                        <td><div class="rel-flex">${relIcon(d.s1_n, d.s1_i)}${relIcon(d.s2_n, d.s2_i)}</div></td>
                        <td><div class="rel-flex">${relIcon(d.f1_n, d.f1_i)}${relIcon(d.f2_n, d.f2_i)}</div></td>
                        <td><div class="rel-flex">${relIcon(d.d1_n, d.d1_i)}${relIcon(d.d2_n, d.d2_i)}</div></td>
                    `;
                    body.appendChild(tr);
                });
            } catch (e) { console.error(e); }
        }
        load();
    </script>
</body>
</html>
