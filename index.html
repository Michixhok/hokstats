<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoKstats | v8.0 Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #161b22; --brd: #30363d; --txt: #f0f6fc; --sec: #8b949e; --acc: #58a6ff; --btn-bg: #21262d; }
        body { background: var(--bg); color: var(--txt); font-family: system-ui, sans-serif; padding: 20px 10px; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        .header { width: 1000px; max-width: 95vw; margin-bottom: 25px; border-left: 4px solid var(--acc); padding-left: 12px; display: flex; align-items: baseline; gap: 8px; }
        .v-badge { background: #238636; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        .info-box { width: 1000px; max-width: 95vw; background: rgba(88, 166, 255, 0.05); border: 1px solid var(--brd); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-sizing: border-box; }
        .contact-area { display: flex; gap: 20px; margin-top: 10px; }
        .contact-link { color: var(--acc); text-decoration: none; font-size: 13px; }

        /* PESTAÑAS PRINCIPALES */
        .main-tabs { display: flex; gap: 10px; width: 1000px; max-width: 95vw; margin-bottom: 20px; border-bottom: 1px solid var(--brd); padding-bottom: 10px; }
        .tab-btn { background: transparent; border: none; color: var(--sec); font-size: 16px; font-weight: 600; cursor: pointer; padding: 8px 16px; border-radius: 6px; transition: 0.2s; }
        .tab-btn.active { color: var(--acc); background: rgba(88, 166, 255, 0.1); }

        .content-section { display: none; width: 1000px; max-width: 95vw; }
        .content-section.active { display: block; }

        /* CONTROLES (Buscador y Filtros de Rol) */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; }
        .filter-bar { display: flex; background: var(--card); border: 1px solid var(--brd); border-radius: 8px; padding: 4px; gap: 4px; }
        .filter-btn { background: transparent; border: none; color: var(--sec); padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 6px; }
        .filter-btn.active { background: var(--acc); color: #fff; }
        .search-box { background: var(--card); border: 1px solid var(--brd); border-radius: 8px; padding: 8px 12px; flex-grow: 1; max-width: 250px; }
        .search-box input { background: transparent; border: none; color: var(--txt); width: 100%; outline: none; font-size: 13px; }

        /* TABLA */
        table { width: 100%; border-collapse: separate; border-spacing: 0 2px; table-layout: fixed; }
        th { color: var(--sec); font-size: 10px; text-transform: uppercase; padding: 10px; cursor: pointer; }
        tr.hero-row td { background: var(--card); padding: 8px; text-align: center; border-top: 1px solid var(--brd); border-bottom: 1px solid var(--brd); }
        tr.hero-row td:first-child { border-left: 1px solid var(--brd); border-radius: 6px 0 0 6px; text-align: left; }
        tr.hero-row td:last-child { border-right: 1px solid var(--brd); border-radius: 0 6px 6px 0; }
        .img-main { width: 36px; height: 36px; border-radius: 6px; }
        .tier-txt { font-size: 16px; font-weight: 800; }
        .stat-txt { font-size: 12px; color: var(--sec); }

        /* ÁREA DEL GRÁFICO */
        .chart-container { background: var(--card); border: 1px solid var(--brd); border-radius: 12px; padding: 20px; position: relative; height: 600px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 20px;">HoKstats</h1>
            <span class="v-badge">v8.0</span>
        </div>

        <div class="info-box">
            <p style="font-size: 13px; color: var(--sec); margin:0;">Proyecto independiente para el análisis de datos de <strong>Honor of Kings</strong>.</p>
            <div class="contact-area">
                <a href="mailto:michixhok@gmail.com" class="contact-link">✉ Email</a>
                <a href="https://www.youtube.com/@michixhok" target="_blank" class="contact-link">▶ YouTube</a>
            </div>
        </div>

        <div class="main-tabs">
            <button class="tab-btn active" onclick="switchTab('stats', this)">Estadísticas</button>
            <button class="tab-btn" onclick="switchTab('analytics', this)">Análisis Gráfico</button>
        </div>

        <div id="section-stats" class="content-section active">
            <div class="toolbar">
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="setFilter('Todo', this)">Todo</button>
                    <button class="filter-btn" onclick="setFilter('Choque', this)">Choque</button>
                    <button class="filter-btn" onclick="setFilter('Cazador', this)">Cazador</button>
                    <button class="filter-btn" onclick="setFilter('Medio', this)">Medio</button>
                    <button class="filter-btn" onclick="setFilter('Merodeo', this)">Merodeo</button>
                    <button class="filter-btn" onclick="setFilter('Farmeo', this)">Farmeo</button>
                </div>
                <div class="search-box">
                    <input type="text" id="heroSearch" placeholder="Buscar héroe..." onkeyup="applyFilters()">
                </div>
            </div>
            <table id="heroTable">
                <thead>
                    <tr>
                        <th style="width:180px" onclick="sortRows(0, 'str')">Héroe</th>
                        <th style="width:60px" onclick="sortRows(1, 'num')">Tier</th>
                        <th style="width:100px">Win Rate</th>
                        <th style="width:100px">Pick Rate</th>
                        <th style="width:100px">Ban Rate</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div id="section-analytics" class="content-section">
            <div class="chart-container">
                <canvas id="scatterChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + Date.now();
        let heroData = [];
        let myChart = null;

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('section-' + tabId).classList.add('active');
            if(tabId === 'analytics') renderChart();
        }

        async function load() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').map(l => l.split(',')); // Simplificado para brevedad
            
            heroData = rows.slice(1).map(r => ({
                name: r[1], img: r[3], win: parseFloat(r[8]) || 0, pick: parseFloat(r[9]) || 0,
                tier: r[29], pos: r[30], roles: `${r[5]},${r[6]}`
            })).filter(h => h.name);

            const body = document.getElementById('table-body');
            heroData.forEach(h => {
                const tr = document.createElement('tr');
                tr.className = 'hero-row';
                tr.setAttribute('data-roles', h.roles);
                tr.innerHTML = `
                    <td><div style="display:flex; align-items:center; gap:10px"><img src="${h.img}" class="img-main"><span>${h.name}</span></div></td>
                    <td><span class="tier-txt">${h.tier || '-'}</span></td>
                    <td class="stat-txt">${h.win}%</td>
                    <td class="stat-txt">${h.pick}%</td>
                    <td class="stat-txt">${h.win}%</td>
                `;
                body.appendChild(tr);
            });
        }

        function renderChart() {
            if(myChart) return; 
            const ctx = document.getElementById('scatterChart').getContext('2d');
            
            // Creamos elementos de imagen para cada héroe
            const images = heroData.map(h => {
                const img = new Image();
                img.src = h.img;
                img.width = 25;
                img.height = 25;
                return img;
            });

            myChart = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: 'Héroes',
                        data: heroData.map(h => ({ x: h.pick, y: h.win, name: h.name })),
                        pointStyle: images, // AQUÍ SE CARGAN LAS CARAS
                        pointRadius: 12
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: 'Tasa de Selección (%)', color: '#8b949e' } },
                        y: { title: { display: true, text: 'Tasa de Victoria (%)', color: '#8b949e' } }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: { label: (ctx) => `${ctx.raw.name}: W ${ctx.raw.y}% | P ${ctx.raw.x}%` }
                        }
                    }
                }
            });
        }

        // Filtros y carga inicial
        function setFilter(r, b) { /* Lógica v7.1 */ }
        load();
    </script>
</body>
</html>
