<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOKStats | v4.4 Aesthetic Update</title>
    <style>
        :root { --bg: #0b0e11; --card: #161b22; --brd: #30363d; --txt: #f0f6fc; --sec: #8b949e; --acc: #58a6ff; }
        body { background: var(--bg); color: var(--txt); font-family: system-ui, sans-serif; padding: 20px 10px; margin: 0; }
        
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        .header { width: fit-content; margin-bottom: 15px; border-left: 4px solid var(--acc); padding-left: 12px; display: flex; align-items: baseline; gap: 8px; align-self: center; }
        .v-badge { background: #238636; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
        
        table { width: auto; border-collapse: separate; border-spacing: 0 4px; margin: 0 auto; }
        
        th { color: var(--sec); font-size: 10px; text-transform: uppercase; padding: 8px 15px; text-align: left; letter-spacing: 0.5px; }

        .w-hero { width: 160px; } 
        .w-roles { width: 100px; } 
        .w-stat { width: 70px; text-align: center; }
        .w-rel { width: 80px; }

        tr.hero-row td { background: var(--card); padding: 8px 15px; border-top: 1px solid var(--brd); border-bottom: 1px solid var(--brd); vertical-align: middle; }
        tr.hero-row td:first-child { border-left: 1px solid var(--brd); border-radius: 6px 0 0 6px; }
        tr.hero-row td:last-child { border-right: 1px solid var(--brd); border-radius: 0 6px 6px 0; }

        .hero-info { display: flex; align-items: center; gap: 10px; }
        
        /* --- ESTILO ACTUALIZADO: ICONO DE IPHONE --- */
        .img-main { 
            width: 38px; 
            height: 38px; 
            border-radius: 9px; /* Bordes muy redondeados tipo iPhone */
            border: 1.5px solid var(--brd); 
            object-fit: cover;
            background-color: var(--brd); /* Fondo de seguridad */
        }
        
        /* Los iconos pequeños se mantienen circulares */
        .img-mini { 
            width: 24px; 
            height: 24px; 
            border-radius: 50%; 
            border: 1px solid var(--brd); 
            object-fit: cover;
        }

        .name-txt { font-weight: 600; font-size: 14px; color: #fff; display: block; white-space: nowrap; }
        .type-txt, .stat-txt { color: var(--sec); font-size: 11px; font-weight: normal; white-space: nowrap; }

        .roles-flex { display: flex; flex-direction: column; justify-content: center; width: 100px; }
        .rel-flex { display: flex; flex-direction: row; gap: 5px; align-items: center; }

        @media (max-width: 800px) {
            .container { align-items: flex-start; overflow-x: auto; }
            table { margin: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 20px;">HOKStats</h1>
            <span class="v-badge">v4.4</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th class="w-hero">Héroe</th>
                    <th class="w-roles">Roles</th>
                    <th class="w-stat">Win</th>
                    <th class="w-stat">Pick</th>
                    <th class="w-stat">Ban</th>
                    <th class="w-rel">Sinergia</th>
                    <th class="w-rel">Fuerte</th>
                    <th class="w-rel">Débil</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + Date.now();

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').map(line => {
                    const parts = []; let curr = '', q = false;
                    for (let c of line) { if (c === '"') q = !q; else if (c === ',' && !q) { parts.push(curr); curr = ''; } else curr += c; }
                    parts.push(curr); return parts;
                });

                const body = document.getElementById('table-body');
                rows.slice(1).forEach(row => {
                    if (!row[1]) return;
                    const d = {
                        n: row[1], img: row[3], type: row[4],
                        r1: row[5], r2: row[6], r3: row[7],
                        w: row[8], p: row[9], b: row[10],
                        s1n: row[11], s1i: row[13], s2n: row[14], s2i: row[16],
                        f1n: row[17], f1i: row[19], f2n: row[20], f2i: row[22],
                        d1n: row[23], d1i: row[25], d2n: row[26], d2i: row[28]
                    };

                    const clean = (v) => (v && !v.includes('http') && v !== "-" && v !== "0") ? v.trim() : "";
                    const img = (v) => (v && v.includes('http')) ? v.trim() : "";
                    const rel = (n, i) => {
                        const name = clean(n);
                        return name ? `<img src="${img(i)}" class="img-mini" title="${name}" alt="${name}" onerror="this.style.display='none'">` : "";
                    };

                    const roles = [clean(d.r1), clean(d.r2), clean(d.r3)].filter(r => r !== "").join('<br>');

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.innerHTML = `
                        <td>
                            <div class="hero-info">
                                <img src="${img(d.img)}" class="img-main" onerror="this.src='https://www.honorofkings.com/global/images/hero/hero_list_default.png'">
                                <div><span class="name-txt">${d.n}</span><span class="type-txt">${clean(d.type)}</span></div>
                            </div>
                        </td>
                        <td><div class="roles-flex stat-txt">${roles}</div></td>
                        <td class="w-stat"><span class="stat-txt">${clean(d.w)}</span></td>
                        <td class="w-stat"><span class="stat-txt">${clean(d.p)}</span></td>
                        <td class="w-stat"><span class="stat-txt">${clean(d.b)}</span></td>
                        <td><div class="rel-flex">${rel(d.s1n, d.s1i)}${rel(d.s2n, d.s2i)}</div></td>
                        <td><div class="rel-flex">${rel(d.f1n, d.f1i)}${rel(d.f2n, d.f2i)}</div></td>
                        <td><div class="rel-flex">${rel(d.d1n, d.d1i)}${rel(d.d2n, d.d2i)}</div></td>
                    `;
                    body.appendChild(tr);
                });
            } catch (e) { console.error(e); }
        }
        load();
    </script>
</body>
</html>
