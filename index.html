<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoKstats | v9.0 - Corrección de Tabla</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0b0e11; 
            --card: #161b22; 
            --brd: #30363d; 
            --txt: #f0f6fc; 
            --sec: #8b949e; 
            --acc: #58a6ff; 
            --btn-bg: #21262d; 
            --green: #238636;
        }

        body { 
            background-color: var(--bg); 
            color: var(--txt); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            padding: 20px 10px; 
            margin: 0; 
            display: flex;
            justify-content: center;
        }
        
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        .header { 
            width: 1080px; 
            max-width: 98vw; 
            margin-bottom: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .header-left { 
            display: flex; 
            align-items: baseline; 
            gap: 10px; 
            border-left: 4px solid var(--acc); 
            padding-left: 15px; 
        }

        .header-left h1 { margin: 0; font-size: 24px; font-weight: 600; }
        .v-badge { background-color: var(--green); color: white; font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: bold; }

        .main-tabs { display: flex; gap: 8px; }

        .tab-btn { 
            background: transparent; 
            border: 1px solid transparent; 
            color: var(--sec); 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            padding: 8px 16px; 
            border-radius: 6px; 
            transition: all 0.3s ease; 
        }

        .tab-btn.active { 
            color: var(--acc); 
            background-color: rgba(88, 166, 255, 0.1); 
            border-color: rgba(88, 166, 255, 0.2);
        }

        .info-box { 
            width: 1080px; 
            max-width: 98vw; 
            background-color: rgba(88, 166, 255, 0.05); 
            border: 1px solid var(--brd); 
            border-radius: 12px; 
            padding: 24px; 
            margin-bottom: 30px; 
            box-sizing: border-box;
            display: flex;
            gap: 20px;
        }

        .info-icon { font-size: 26px; color: var(--acc); }
        .info-text { font-size: 14px; color: var(--sec); line-height: 1.7; margin: 0 0 16px 0; }
        .contact-area { display: flex; gap: 25px; }
        .contact-link { display: flex; align-items: center; gap: 8px; color: var(--acc); text-decoration: none; font-size: 13px; }

        .content-section { display: none; width: 100%; flex-direction: column; align-items: center; }
        .content-section.active { display: flex; }

        .toolbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 1080px; 
            max-width: 98vw; 
            margin-bottom: 25px; 
            gap: 20px; 
        }

        .filter-bar { 
            display: flex; 
            background-color: var(--card); 
            border: 1px solid var(--brd); 
            border-radius: 10px; 
            padding: 5px; 
            gap: 5px; 
        }

        .filter-btn { 
            background: transparent; 
            border: none; 
            color: var(--sec); 
            padding: 8px 18px; 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 7px; 
        }

        .filter-btn.active { background-color: var(--acc); color: #ffffff; }

        .search-box { 
            display: flex; 
            align-items: center; 
            background-color: var(--card); 
            border: 1px solid var(--brd); 
            border-radius: 10px; 
            padding: 0 15px;
            flex-grow: 1;
            max-width: 320px;
        }

        .search-box input { 
            background: transparent; 
            border: none; 
            color: var(--txt); 
            padding: 12px 0; 
            font-size: 14px; 
            width: 100%; 
            outline: none; 
        }

        .table-wrapper { width: 1080px; max-width: 98vw; overflow: visible; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: auto; }
        
        th { color: var(--sec); font-size: 11px; text-transform: uppercase; padding: 12px 8px; text-align: center; cursor: pointer; font-weight: 700; white-space: nowrap; }
        th.w-hero { text-align: left; width: 180px; } 

        tr.hero-row td { 
            background-color: var(--card); 
            padding: 8px; 
            border-top: 1px solid var(--brd); 
            border-bottom: 1px solid var(--brd); 
            text-align: center; 
            vertical-align: middle;
            height: 64px; 
            overflow: hidden;
        }

        tr.hero-row td:first-child { border-left: 1px solid var(--brd); border-radius: 10px 0 0 10px; text-align: left; }
        tr.hero-row td:last-child { border-right: 1px solid var(--brd); border-radius: 0 10px 10px 0; }

        .hero-info { display: flex; align-items: center; gap: 12px; }
        .img-main { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; }
        
        .img-mini { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: none !important; 
            display: block;
        }

        .tier-txt { font-size: 20px; font-weight: 900; color: #ffffff; }
        .name-txt { font-weight: 700; font-size: 14px; color: #ffffff; display: block; }
        
        .type-txt { 
            color: var(--sec); 
            font-size: 10px; 
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        .stat-txt { 
            color: var(--sec); 
            font-size: 11px; 
            font-weight: 600;
            line-height: 1.2;
        }

        .rel-flex { display: flex; gap: 6px; justify-content: center; min-width: 70px; }

        .chart-area { 
            width: 1080px; 
            max-width: 98vw; 
            background-color: var(--card); 
            border: 1px solid var(--brd); 
            border-radius: 14px; 
            padding: 35px; 
            box-sizing: border-box; 
            height: 680px; 
        }

        @media (max-width: 1100px) { 
            .header, .info-box, .toolbar, .chart-area, .table-wrapper { width: 98vw; }
            .name-txt { font-size: 13px; }
            .img-main { width: 38px; height: 38px; }
            .img-mini { width: 28px; height: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>HoKstats</h1>
                <span class="v-badge">v9.0</span>
            </div>
            <div class="main-tabs">
                <button class="tab-btn active" onclick="switchTab('stats', this)">Estadísticas</button>
                <button class="tab-btn" onclick="switchTab('analytics', this)">Análisis Gráfico</button>
            </div>
        </div>

        <div class="info-box">
            <div class="info-icon">💡</div>
            <div class="info-content">
                <p class="info-text">
                    Proyecto personal para optimizar el rendimiento en <strong>Honor of Kings</strong>. 
                    Independiente de Level Infinite/TiMi Studio. Datos obtenidos de fuentes públicas.
                </p>
                <div class="contact-area">
                    <a href="mailto:michixhok@gmail.com" class="contact-link">✉ michixhok@gmail.com</a>
                    <a href="https://www.youtube.com/@michixhok" target="_blank" class="contact-link">▶ YouTube</a>
                </div>
            </div>
        </div>

        <div id="section-stats" class="content-section active">
            <div class="toolbar">
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="setFilter('Todo', this)">Todo</button>
                    <button class="filter-btn" onclick="setFilter('Choque', this)">Choque</button>
                    <button class="filter-btn" onclick="setFilter('Cazador', this)">Cazador</button>
                    <button class="filter-btn" onclick="setFilter('Medio', this)">Medio</button>
                    <button class="filter-btn" onclick="setFilter('Merodeo', this)">Merodeo</button>
                    <button class="filter-btn" onclick="setFilter('Farmeo', this)">Farmeo</button>
                </div>
                <div class="search-box">
                    <input type="text" id="heroSearch" placeholder="Buscar héroe..." onkeyup="applyFilters()">
                </div>
            </div>
            
            <div class="table-wrapper">
                <table id="heroTable">
                    <thead>
                        <tr>
                            <th class="w-hero" onclick="sortRows(0, 'str')">Héroe</th>
                            <th style="width:60px" onclick="sortRows(1, 'num')">Tier</th>
                            <th style="width:90px">Roles</th>
                            <th onclick="sortRows(3, 'num')">Win Rate</th>
                            <th onclick="sortRows(4, 'num')">Pick Rate</th>
                            <th onclick="sortRows(5, 'num')">Ban Rate</th>
                            <th>Sinergia</th>
                            <th>Fuerte</th>
                            <th>Débil</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="section-analytics" class="content-section">
            <div class="toolbar">
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="setFilterChart('Todo', this)">Todo</button>
                    <button class="filter-btn" onclick="setFilterChart('Choque', this)">Choque</button>
                    <button class="filter-btn" onclick="setFilterChart('Cazador', this)">Cazador</button>
                    <button class="filter-btn" onclick="setFilterChart('Medio', this)">Medio</button>
                    <button class="filter-btn" onclick="setFilterChart('Merodeo', this)">Merodeo</button>
                    <button class="filter-btn" onclick="setFilterChart('Farmeo', this)">Farmeo</button>
                </div>
            </div>
            <div class="chart-area">
                <canvas id="scatterChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + Date.now();
        let currentSort = { col: 1, asc: true }; 
        let activeRole = 'Todo';
        let chartFilter = 'Todo';
        let allHeroes = [];
        let myChart = null;

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('section-' + tabId).classList.add('active');
            if(tabId === 'analytics') setTimeout(renderChart, 100);
        }

        function setFilter(role, btn) {
            document.querySelectorAll('#section-stats .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeRole = role;
            applyFilters();
        }

        function setFilterChart(role, btn) {
            document.querySelectorAll('#section-analytics .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            chartFilter = role;
            renderChart();
        }

        function applyFilters() {
            const query = document.getElementById('heroSearch').value.toLowerCase();
            document.querySelectorAll('.hero-row').forEach(row => {
                const name = row.querySelector('.name-txt').innerText.toLowerCase();
                const roles = row.getAttribute('data-roles').toLowerCase();
                row.style.display = ((activeRole === 'Todo' || roles.includes(activeRole.toLowerCase())) && name.includes(query)) ? '' : 'none';
            });
        }

        function sortRows(col, type) {
            const tbody = document.getElementById('table-body');
            const rows = Array.from(tbody.querySelectorAll('.hero-row'));
            if (currentSort.col === col) currentSort.asc = !currentSort.asc;
            else { currentSort.col = col; currentSort.asc = true; }
            rows.sort((a, b) => {
                let vA, vB;
                if (col === 1) { vA = parseInt(a.getAttribute('data-pos')) || 999; vB = parseInt(b.getAttribute('data-pos')) || 999; }
                else if (type === 'str') { vA = a.cells[col].innerText.toLowerCase(); vB = b.cells[col].innerText.toLowerCase(); }
                else { vA = parseFloat(a.cells[col].innerText.replace('%','')) || 0; vB = parseFloat(b.cells[col].innerText.replace('%','')) || 0; }
                return currentSort.asc ? vA - vB : vB - vA;
            });
            rows.forEach(r => tbody.appendChild(r));
        }

        function renderChart() {
            if(myChart) myChart.destroy();
            const ctx = document.getElementById('scatterChart').getContext('2d');
            
            const filteredHeroes = allHeroes.filter(h => {
                const roles = [h.r1, h.r2, h.r3].map(r => r ? r.toLowerCase() : "");
                return chartFilter === 'Todo' || roles.some(r => r.includes(chartFilter.toLowerCase()));
            });

            const heroPoints = filteredHeroes.map(h => {
                const img = new Image();
                img.src = h.img;
                return { img, x: (h.p_raw + h.b_raw), y: h.w_raw, name: h.n };
            });

            myChart = new Chart(ctx, {
                type: 'scatter',
                data: { datasets: [{ data: heroPoints, pointRadius: 8, pointHoverRadius: 22 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { 
                            title: { display: true, text: 'Presencia %', color: '#8b949e' }, 
                            min: 0, max: 6,
                            grid: {
                                color: (context) => context.tick.value === 1 ? 'rgba(88, 166, 255, 0.4)' : 'rgba(48, 54, 61, 0.5)',
                                lineWidth: (context) => context.tick.value === 1 ? 2 : 1
                            }
                        },
                        y: { 
                            title: { display: true, text: 'Win Rate %', color: '#8b949e' }, 
                            min: 40, max: 60,
                            grid: {
                                color: (context) => context.tick.value === 50 ? 'rgba(88, 166, 255, 0.4)' : 'rgba(48, 54, 61, 0.5)',
                                lineWidth: (context) => context.tick.value === 50 ? 2 : 1
                            }
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { callbacks: { label: (c) => ` ${c.raw.name}: Win ${c.raw.y}% | Presencia ${c.raw.x.toFixed(2)}%` } }
                    }
                },
                plugins: [{
                    id: 'heroIcons',
                    afterDatasetDraw(chart) {
                        const {ctx} = chart;
                        chart.getDatasetMeta(0).data.forEach((point, index) => {
                            const {x, y} = point;
                            const hero = heroPoints[index];
                            const size = 26;
                            if (hero.img.complete) {
                                ctx.save();
                                ctx.beginPath();
                                ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                                ctx.clip();
                                ctx.drawImage(hero.img, x - size / 2, y - size / 2, size, size);
                                ctx.restore();
                            }
                        });
                    }
                }]
            });
        }

        async function loadData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').map(l => {
                    const p = []; let c = '', q = false;
                    for (let x of l) { if (x === '"') q = !q; else if (x === ',' && !q) { p.push(c); c = ''; } else c += x; }
                    p.push(c); return p;
                });
                const tbody = document.getElementById('table-body');
                allHeroes = rows.slice(1).map(r => {
                    if (!r[1]) return null;
                    return {
                        n: r[1], img: r[3], type: r[4], r1: r[5], r2: r[6], r3: r[7],
                        w: r[8], p: r[9], b: r[10],
                        s1i: r[13], s2i: r[16], f1i: r[19], f2i: r[22], d1i: r[25], d2i: r[28],
                        tier: r[29], pos: r[30],
                        w_raw: parseFloat(r[8]) || 0, p_raw: parseFloat(r[9]) || 0, b_raw: parseFloat(r[10]) || 0
                    };
                }).filter(h => h !== null);

                allHeroes.sort((a, b) => (parseInt(a.pos) || 999) - (parseInt(b.pos) || 999));

                allHeroes.forEach(d => {
                    const clean = (v) => (v && !v.includes('http') && v !== "-" && v !== "0") ? v.trim() : "";
                    const getImg = (v) => (v && v.includes('http')) ? v.trim() : "";
                    const rel = (url) => url ? `<img src="${url}" class="img-mini" onerror="this.style.display='none'">` : "";
                    const roles = [clean(d.r1), clean(d.r2), clean(d.r3)].filter(x=>x);
                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.setAttribute('data-roles', roles.join(','));
                    tr.setAttribute('data-pos', d.pos);
                    tr.innerHTML = `
                        <td><div class="hero-info"><img src="${getImg(d.img)}" class="img-main"><div><span class="name-txt">${d.n}</span><span class="type-txt">${clean(d.type)}</span></div></div></td>
                        <td><span class="tier-txt">${clean(d.tier)}</span></td>
                        <td><div class="stat-txt">${roles.join('<br>')}</div></td>
                        <td><span class="stat-txt">${d.w}</span></td>
                        <td><span class="stat-txt">${d.p}</span></td>
                        <td><span class="stat-txt">${d.b}</span></td>
                        <td><div class="rel-flex">${rel(getImg(d.s1i))}${rel(getImg(d.s2i))}</div></td>
                        <td><div class="rel-flex">${rel(getImg(d.f1i))}${rel(getImg(d.f2i))}</div></td>
                        <td><div class="rel-flex">${rel(getImg(d.d1i))}${rel(getImg(d.d2i))}</div></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) { console.error(e); }
        }
        window.onload = loadData;
    </script>
</body>
</html>
