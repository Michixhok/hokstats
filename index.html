<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOKStats | v3.3 Final Fix</title>
    <style>
        :root {
            --bg-body: #0b0e11;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-sec: #8b949e;
            --accent: #58a6ff;
        }

        body { 
            background: var(--bg-body); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px; margin: 0;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .header-section { 
            margin-bottom: 20px; border-left: 4px solid var(--accent); 
            padding-left: 15px; display: flex; align-items: baseline; gap: 12px;
        }
        .version-badge {
            background: #238636; color: white; font-size: 9px;
            padding: 2px 6px; border-radius: 10px; font-weight: bold;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; }
        
        th { 
            color: var(--text-sec); font-size: 10px; text-transform: uppercase; 
            padding: 8px 12px; font-weight: 600; text-align: left;
        }

        /* Bloqueo de anchos para evitar que se corra a la derecha */
        .w-hero { width: 15%; }
        .w-role { width: 8%; }
        .w-stat { width: 7%; }
        .w-rel  { width: 13%; }

        tr.hero-row td {
            background: var(--bg-card); padding: 12px;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            vertical-align: middle; overflow: hidden;
        }

        tr.hero-row td:first-child { border-left: 1px solid var(--border); border-radius: 8px 0 0 8px; }
        tr.hero-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 8px 8px 0; }

        .hero-flex { display: flex; align-items: center; gap: 12px; }
        .img-main { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; object-fit: cover; }
        .img-mini { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; }

        .rel-container { display: flex; flex-direction: column; gap: 6px; }
        .rel-item { display: flex; align-items: center; gap: 8px; }
        
        .hero-name { font-weight: bold; font-size: 14px; color: #fff; display: block; }
        .hero-type { color: var(--text-sec); font-size: 10px; display: block; }
        .stat-val { font-weight: 600; font-size: 13px; color: #fff; }

        .blue { color: var(--accent); }
        .red { color: #f85149; }
        .name-tag { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1 style="margin:0; font-size: 20px;">HOKStats</h1>
            <span class="version-badge">Build v3.3</span>
            <span style="color: var(--text-sec); font-size: 12px;">| Meta Database Chile</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="w-hero">Héroe</th>
                    <th class="w-role">Rol 1</th>
                    <th class="w-role">Rol 2</th>
                    <th class="w-role">Rol 3</th>
                    <th class="w-stat">Win Rate</th>
                    <th class="w-stat">Pick Rate</th>
                    <th class="w-stat">Ban Rate</th>
                    <th class="w-rel">Sinergias</th>
                    <th class="w-rel">Fuerte vs</th>
                    <th class="w-rel">Débil vs</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + new Date().getTime();

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                
                // Procesamiento de CSV ultra-seguro para que nada se corra a la derecha
                const rows = text.split('\n').map(line => {
                    const result = [];
                    let cell = '', inQuotes = false;
                    for (let char of line) {
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { result.push(cell); cell = ''; }
                        else cell += char;
                    }
                    result.push(cell);
                    return result;
                });

                const tableBody = document.getElementById('table-body');
                
                rows.slice(1).forEach(col => {
                    if (!col[1] || col[1].trim() === "") return;

                    const clean = (val) => val ? val.trim().replace(/^"|"$/g, '') : "";
                    
                    // Función para renderizar relaciones (asegura que aparezcan las dos)
                    const renderRel = (name, img) => {
                        const cName = clean(name);
                        const cImg = clean(img);
                        if (!cName || cName === "-" || cName === "0") return "";
                        return `<div class="rel-item">
                                    <img src="${cImg}" class="img-mini" onerror="this.style.visibility='hidden'">
                                    <span class="name-tag">${cName}</span>
                                </div>`;
                    };

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.innerHTML = `
                        <td>
                            <div class="hero-flex">
                                <img src="${clean(col[3])}" class="img-main" onerror="this.src='https://www.honorofkings.com/global/images/hero/hero_list_default.png'">
                                <div><span class="hero-name">${col[1]}</span><span class="hero-type">${col[2]}</span></div>
                            </div>
                        </td>
                        <td class="role-text" style="color:var(--text-sec); font-size:11px;">${clean(col[4])}</td>
                        <td class="role-text" style="color:var(--text-sec); font-size:11px;">${clean(col[5])}</td>
                        <td class="role-text" style="color:var(--text-sec); font-size:11px;">${clean(col[6])}</td>
                        <td><span class="stat-val">${clean(col[7])}</span></td>
                        <td><span class="stat-val">${clean(col[8])}</span></td>
                        <td><span class="stat-val">${clean(col[9])}</span></td>
                        <td>
                            <div class="rel-container">
                                ${renderRel(col[10], col[13])}
                                ${renderRel(col[12], col[16])}
                            </div>
                        </td>
                        <td class="blue">
                            <div class="rel-container">
                                ${renderRel(col[14], col[19])}
                                ${renderRel(col[16], col[22])}
                            </div>
                        </td>
                        <td class="red">
                            <div class="rel-container">
                                ${renderRel(col[18], col[25])}
                                ${renderRel(col[20], col[28])}
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error("Error:", e); }
        }
        load();
    </script>
</body>
</html>
