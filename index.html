<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List HoK</title>

<style>
body {
  background: #1c1c1f;
  font-family: Arial, sans-serif;
  color: #7b7a8e;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
  border-radius: 8px;
  overflow: hidden;
}

/* TABS */
.tabs {
  display: flex;
  background: #31313c;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 12px;
  cursor: pointer;
}

.tab.active {
  background: #4f6edb;
  color: white;
  font-weight: bold;
}

/* TABLA */
table {
  width: 100%;
  border-collapse: collapse;
}

/* HEADER */
thead {
  background: #282830;
}

th {
  padding: 10px;
  font-size: 13px;
  text-align: left;
  color: #7b7a8e;
}

/* FILAS */
tbody tr {
  background: #31313c;
  border-top: 1px solid #282830;
  height: 60px; /* altura fija */
}

tbody tr:hover {
  background: #3a3a46;
}

td {
  padding: 10px;
}

/* COLUMNAS */
.rank {
  width: 40px;
  text-align: center;
}

.champion {
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
}

.champion img {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  object-fit: cover;
}

/* TIER */
.tier-badge {
  background: #2f80ed;
  color: white;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 6px;
  text-align: center;
  width: 24px;
  margin: auto;
}

/* STATS */
.stat {
  text-align: center;
}

/* ROLES */
.role-cell {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 1px;
  font-size: 11px;
  line-height: 1.1;
  height: 40px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" data-role="all">Todo</div>
    <div class="tab" data-role="Choque">Choque</div>
    <div class="tab" data-role="Cazador">Cazador</div>
    <div class="tab" data-role="Medio">Medio</div>
    <div class="tab" data-role="Merodeo">Merodeo</div>
    <div class="tab" data-role="Farmeo">Farmeo</div>
  </div>

  <!-- TABLA -->
  <table>
    <thead>
      <tr>
        <th class="rank">#</th>
        <th>Héroe</th>
        <th class="stat">Tier</th>
        <th class="stat">Rol</th>
        <th class="stat">Win Rate</th>
        <th class="stat">Pick Rate</th>
        <th class="stat">Ban Rate</th>
      </tr>
    </thead>

    <tbody></tbody>
  </table>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv";

let allData = [];

fetch(CSV_URL)
  .then(res => res.text())
  .then(csv => {

    const rows = csv.split("\n").slice(1);

    rows.forEach(row => {
      if (!row.trim()) return;

      const cols = row.split(",");

      const nombre = cols[1];
      if (!nombre) return;

      allData.push({
        nombre,
        imagen: cols[3],
        roles: [cols[5], cols[6], cols[7]].filter(r => r && r.trim() !== ""),
        win: cols[8],
        pick: cols[9],
        ban: cols[10]
      });
    });

    renderTable(allData);
  });

function renderTable(data) {
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach((item, index) => {

    const rolesHTML = item.roles.map(r => `<div>${r}</div>`).join("");

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="rank">${index + 1}</td>

      <td>
        <div class="champion">
          <img src="${item.imagen}" onerror="this.style.display='none'">
          <span>${item.nombre}</span>
        </div>
      </td>

      <td class="stat"><div class="tier-badge">1</div></td>

      <td class="stat">
        <div class="role-cell">
          ${rolesHTML}
        </div>
      </td>

      <td class="stat">${item.win}</td>
      <td class="stat">${item.pick}</td>
      <td class="stat">${item.ban}</td>
    `;

    tbody.appendChild(tr);
  });
}

/* FILTROS */
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");

    const role = tab.dataset.role;

    if (role === "all") {
      renderTable(allData);
    } else {
      const filtered = allData.filter(item =>
        item.roles.includes(role)
      );
      renderTable(filtered);
    }
  });
});
</script>

</body>
</html>
