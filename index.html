<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* RESET TOTAL PARA QUE NO HAYA "INVENTOS" DEL NAVEGADOR */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0e0e10; /* Fondo de la página según tu HTML */
            padding: 50px;
            font-family: sans-serif;
        }

        /* EL ESQUELETO (CONTENEDOR) */
        .table-wrapper {
            width: 1016px; /* Ancho real de la tabla en OP.GG */
            margin: 0 auto;
            background-color: #171719; /* Color de fondo de la tabla */
            border: 1px solid #2d2d31; /* Color de borde exacto */
            border-radius: 4px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse; /* Crucial: elimina cualquier espacio entre celdas */
            border-spacing: 0;
        }

        /* CABECERA (EL ESQUELETO SUPERIOR) */
        thead {
            background-color: #1c1c1f; /* Fondo del header en el archivo */
        }

        th {
            height: 40px; /* Altura exacta */
            padding: 0 16px;
            color: #9e9eb1; /* Color del texto del header */
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid #2d2d31;
            text-align: center;
        }

        /* ALINEACIÓN DE LA COLUMNA DE NOMBRE */
        th:first-child, td:first-child {
            text-align: left;
            width: 200px;
        }

        /* CUERPO (LAS FILAS) */
        tr.hero-row td {
            height: 52px; /* Altura de fila exacta */
            padding: 0 16px;
            background-color: #171719; /* Mismo que la tabla */
            border-bottom: 1px solid #2d2d31; /* Línea divisoria sutil */
            color: #9e9eb1;
            font-size: 12px;
        }

        /* HOVER: EL CAMBIO DE COLOR AL PASAR EL MOUSE */
        tr.hero-row:hover td {
            background-color: #1c1c21; /* Color de hover real */
        }

        /* ÚLTIMA FILA: QUITA EL BORDE PARA QUE NO SE DUPLIQUE CON EL CONTENEDOR */
        tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Campeón</th>
                    <th>Win Rate</th>
                    <th>Pick Rate</th>
                    <th>Ban Rate</th>
                    <th>Sinergias</th>
                    <th>Counters</th>
                </tr>
            </thead>
            <tbody>
                <tr class="hero-row">
                    <td>Dato Héroe</td>
                    <td>52.5%</td>
                    <td>10.2%</td>
                    <td>5.0%</td>
                    <td>Iconos</td>
                    <td>Iconos</td>
                </tr>
                <tr class="hero-row">
                    <td>Dato Héroe</td>
                    <td>51.2%</td>
                    <td>8.4%</td>
                    <td>2.1%</td>
                    <td>Iconos</td>
                    <td>Iconos</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
