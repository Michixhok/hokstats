<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List HoK</title>

<style>
body {
  background: #1c1c1f;
  font-family: Arial, sans-serif;
  color: #7b7a8e;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
  border-radius: 8px;
  overflow: hidden;
}

/* TABS */
.tabs {
  display: flex;
  background: #31313c;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 12px;
  cursor: pointer;
}

.tab.active {
  background: #4f6edb;
  color: white;
  font-weight: bold;
}

/* TABLA */
table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: #282830;
}

th {
  padding: 10px;
  font-size: 13px;
  text-align: left;
  color: #7b7a8e;
}

tbody tr {
  background: #31313c;
  border-top: 1px solid #282830;
  height: 60px;
}

tbody tr:hover {
  background: #3a3a46;
}

td {
  padding: 10px;
}

.rank {
  width: 40px;
  text-align: center;
}

.champion {
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
}

.champion img {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  object-fit: cover;
}

.tier-badge {
  background: #2f80ed;
  color: white;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 6px;
  text-align: center;
  width: 24px;
  margin: auto;
}

.stat {
  text-align: center;
}

.role-cell {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 1px;
  font-size: 11px;
  height: 40px;
}
</style>
</head>

<body>

<div class="container">

  <div class="tabs">
    <div class="tab active" data-role="all">Todo</div>
    <div class="tab" data-role="Choque">Choque</div>
    <div class="tab" data-role="Cazador">Cazador</div>
    <div class="tab" data-role="Medio">Medio</div>
    <div class="tab" data-role="Merodeo">Merodeo</div>
    <div class="tab" data-role="Farmeo">Farmeo</div>
  </div>

  <table>
    <thead>
      <tr>
        <th class="rank">#</th>
        <th>Héroe</th>
        <th class="stat">Tier</th>
        <th class="stat">Rol</th>
        <th class="stat">Win Rate</th>
        <th class="stat">Pick Rate</th>
        <th class="stat">Ban Rate</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv";

let allData = [];

/* PARSER CSV CORRECTO */
function parseCSV(text) {
  const rows = [];
  let row = [];
  let current = '';
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];

    if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === ',' && !insideQuotes) {
      row.push(current);
      current = '';
    } else if (char === '\n' && !insideQuotes) {
      row.push(current);
      rows.push(row);
      row = [];
      current = '';
    } else {
      current += char;
    }
  }

  row.push(current);
  rows.push(row);

  return rows;
}

fetch(CSV_URL)
  .then(res => res.text())
  .then(csv => {

    const data = parseCSV(csv).slice(1);

    data.forEach(cols => {

      const nombre = cols[1];
      if (!nombre) return;

      allData.push({
        nombre,
        imagen: cols[3],
        roles: [cols[5], cols[6], cols[7]].filter(r => r),
        win: cols[8],
        pick: cols[9],
        ban: cols[10]
      });
    });

    renderTable(allData);
  });

function renderTable(data) {
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach((item, index) => {

    const rolesHTML = item.roles.map(r => `<div>${r}</div>`).join("");

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="rank">${index + 1}</td>
      <td>
        <div class="champion">
          <img src="${item.imagen}" onerror="this.style.display='none'">
          <span>${item.nombre}</span>
        </div>
      </td>
      <td class="stat"><div class="tier-badge">1</div></td>
      <td class="stat"><div class="role-cell">${rolesHTML}</div></td>
      <td class="stat">${item.win}</td>
      <td class="stat">${item.pick}</td>
      <td class="stat">${item.ban}</td>
    `;

    tbody.appendChild(tr);
  });
}

/* FILTROS */
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");

    const role = tab.dataset.role;

    if (role === "all") {
      renderTable(allData);
    } else {
      const filtered = allData.filter(item =>
        item.roles.includes(role)
      );
      renderTable(filtered);
    }
  });
});
</script>

</body>
</html>
