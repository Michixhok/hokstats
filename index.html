<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOKStats | v3.5 Fixed Layout</title>
    <style>
        :root {
            --bg-body: #0b0e11;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-sec: #8b949e;
            --accent: #58a6ff;
        }

        body { 
            background: var(--bg-body); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px; margin: 0;
        }

        .container { max-width: 1450px; margin: 0 auto; }

        .header { 
            margin-bottom: 20px; border-left: 4px solid var(--accent); 
            padding-left: 15px; display: flex; align-items: baseline; gap: 10px;
        }
        .v-badge { background: #238636; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 6px; table-layout: fixed; }
        
        th { color: var(--text-sec); font-size: 11px; text-transform: uppercase; padding: 10px; text-align: left; }

        /* Control total de anchos para evitar desbordamientos */
        .w-hero { width: 180px; }
        .w-role { width: 100px; }
        .w-stat { width: 80px; }
        .w-rel  { width: 140px; }

        tr.hero-row td {
            background: var(--bg-card); padding: 12px 15px;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr.hero-row td:first-child { border-left: 1px solid var(--border); border-radius: 10px 0 0 10px; }
        tr.hero-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 10px 10px 0; }

        .hero-info { display: flex; align-items: center; gap: 12px; }
        .img-main { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; object-fit: cover; }
        .img-mini { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; }

        .rel-list { display: flex; flex-direction: column; gap: 6px; }
        .rel-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        
        .name-txt { font-weight: bold; font-size: 15px; color: #fff; display: block; line-height: 1.2; }
        .type-txt { color: var(--text-sec); font-size: 11px; display: block; }
        .stat-val { font-weight: 700; font-size: 14px; color: #fff; }

        .blue { color: var(--accent); }
        .red { color: #f85149; }
        .role-txt { color: var(--text-sec); font-size: 11px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 22px;">HOKStats</h1>
            <span class="v-badge">Build v3.5</span>
            <span style="color: var(--text-sec); font-size: 13px;">| Meta Database Chile</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="w-hero">Héroe / Tipo</th>
                    <th class="w-role">Roles</th>
                    <th class="w-stat">Win Rate</th>
                    <th class="w-stat">Pick Rate</th>
                    <th class="w-stat">Ban Rate</th>
                    <th class="w-rel">Sinergias</th>
                    <th class="w-rel">Fuerte vs</th>
                    <th class="w-rel">Débil vs</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + Date.now();

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                // Split inteligente que respeta comas en URLs
                const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                const tableBody = document.getElementById('table-body');
                
                rows.slice(1).forEach(col => {
                    if (!col[1] || col[1].trim() === "") return;

                    const clean = (v) => {
                        if (!v) return "";
                        let s = v.trim().replace(/^"|"$/g, '');
                        // Si es un link o un guión, no lo mostramos como texto
                        return (s.startsWith('http') || s === "-" || s === "0") ? "" : s;
                    };

                    const getImg = (v) => {
                        if (!v) return "";
                        let s = v.trim().replace(/^"|"$/g, '');
                        return s.startsWith('http') ? s : "";
                    };

                    const renderRel = (nameIdx, imgIdx) => {
                        const name = clean(col[nameIdx]);
                        const img = getImg(col[imgIdx]);
                        if (!name) return "";
                        return `<div class="rel-row">
                                    <img src="${img}" class="img-mini" onerror="this.style.visibility='hidden'">
                                    <span>${name}</span>
                                </div>`;
                    };

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.innerHTML = `
                        <td>
                            <div class="hero-info">
                                <img src="${getImg(col[3])}" class="img-main" onerror="this.src='https://www.honorofkings.com/global/images/hero/hero_list_default.png'">
                                <div>
                                    <span class="name-txt">${col[1]}</span>
                                    <span class="type-txt">${clean(col[2])}</span>
                                </div>
                            </div>
                        </td>
                        <td><div class="role-txt">${clean(col[4])}<br>${clean(col[5])}</div></td>
                        <td><span class="stat-val">${clean(col[7])}</span></td>
                        <td><span class="stat-val">${clean(col[8])}</span></td>
                        <td><span class="stat-val">${clean(col[9])}</span></td>
                        <td><div class="rel-list">${renderRel(10, 13)}${renderRel(12, 16)}</div></td>
                        <td class="blue"><div class="rel-list">${renderRel(14, 19)}${renderRel(16, 22)}</div></td>
                        <td class="red"><div class="rel-list">${renderRel(18, 25)}${renderRel(20, 28)}</div></td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error("Error cargando tabla:", e); }
        }
        load();
    </script>
</body>
</html>
