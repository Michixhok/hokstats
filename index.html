<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List HoK</title>

<style>
body {
  background: #1c1c1f;
  font-family: Arial, sans-serif;
  color: #7b7a8e;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.main-box {
  background: #31313c;
  border-radius: 6px;
  overflow: hidden;
}

.tabs-container {
  padding: 10px;
  background: #31313c;
}

.tabs {
  display: flex;
  width: 100%;
  border: 1px solid #444452;
  border-radius: 4px;
  overflow: hidden;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 8px 14px;
  cursor: pointer;
  border-right: 1px solid #444452;
  background: #31313c;
  font-size: 13px;
}

.tab:last-child {
  border-right: none;
}

.tab.active {
  background: #4f6edb;
  color: white;
  font-weight: bold;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

thead {
  background: #282830;
}

thead tr {
  border: 1px solid #1c1c1f;
}

th {
  padding: 8px 12px;
  font-size: 13px;
  color: #7b7a8e;
  font-weight: normal;
  cursor: pointer;
}

th.col-hero {
  text-align: center;
}

tbody tr {
  background: #31313c;
  border: 1px solid #1c1c1f;
}

tbody tr:hover {
  background: #3a3a46;
}

td {
  padding: 6px 12px;
}

.col-hero { width: 30%; }
.col-tier { width: 10%; text-align:center; }
.col-rol  { width: 15%; text-align:center; }
.col-stat { width: 15%; text-align:center; }

.champion {
  display: flex;
  align-items: center;
  gap: 12px;
  color: white;
  padding-left: 8px;
}

.champion img {
  width: 36px;
  height: 36px;
  border-radius: 6px;
}

.champion span {
  font-size: 13px;
  font-weight: bold;
}

.tier-badge {
  font-weight: bold;
  text-align: center;
}

.tier-S { color: #ff4d4d; }
.tier-A { color: #ff9f43; }
.tier-B { color: #ffd93d; }
.tier-C { color: #6bcf63; }
.tier-D { color: #4dabf7; }
.tier-E { color: #9aa0a6; }

.stat {
  font-size: 12px;
}

.role-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 10px;
  height: 32px;
}
</style>
</head>

<body>

<div class="container">

  <div class="main-box">

    <div class="tabs-container">
      <div class="tabs">
        <div class="tab active" data-role="all">Todo</div>
        <div class="tab" data-role="Choque">Choque</div>
        <div class="tab" data-role="Cazador">Cazador</div>
        <div class="tab" data-role="Medio">Medio</div>
        <div class="tab" data-role="Merodeo">Merodeo</div>
        <div class="tab" data-role="Farmeo">Farmeo</div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th class="col-hero">Héroe</th>
          <th class="col-tier" onclick="sortTable('pos')">Tier</th>
          <th class="col-rol">Rol</th>
          <th class="col-stat" onclick="sortTable('win')">Win rate</th>
          <th class="col-stat" onclick="sortTable('pick')">Pick rate</th>
          <th class="col-stat" onclick="sortTable('ban')">Ban rate</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv";

let allData = [];
let currentSort = { key: null, asc: false };

function parseCSV(text) {
  const rows = [];
  let row = [], current = '', insideQuotes = false;

  for (let char of text) {
    if (char === '"') insideQuotes = !insideQuotes;
    else if (char === ',' && !insideQuotes) {
      row.push(current); current = '';
    } else if (char === '\n' && !insideQuotes) {
      row.push(current); rows.push(row);
      row = []; current = '';
    } else current += char;
  }

  row.push(current);
  rows.push(row);
  return rows;
}

fetch(CSV_URL)
  .then(res => res.text())
  .then(csv => {
    const data = parseCSV(csv).slice(1);

    data.forEach(cols => {
      if (!cols[1]) return;

      allData.push({
        nombre: cols[1],
        imagen: cols[3],
        roles: [cols[5], cols[6], cols[7]].filter(r => r),
        win: parseFloat(cols[8]),
        pick: parseFloat(cols[9]),
        ban: parseFloat(cols[10]),
        tier: cols[29],
        pos: parseFloat(cols[30])
      });
    });

    renderTable(allData.sort((a,b)=>a.pos-b.pos));
  });

function renderTable(data) {
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach(item => {
    const rolesHTML = item.roles.map(r => `<div>${r}</div>`).join("");
    const tierClass = `tier-${item.tier}`;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="col-hero">
        <div class="champion">
          <img src="${item.imagen}">
          <span>${item.nombre}</span>
        </div>
      </td>

      <td class="col-tier">
        <div class="tier-badge ${tierClass}">${item.tier}</div>
      </td>

      <td class="col-rol">
        <div class="role-cell">${rolesHTML}</div>
      </td>

      <td class="col-stat stat">${item.win}%</td>
      <td class="col-stat stat">${item.pick}%</td>
      <td class="col-stat stat">${item.ban}%</td>
    `;

    tbody.appendChild(tr);
  });
}

/* SORT */
function sortTable(key) {
  const asc = currentSort.key === key ? !currentSort.asc : false;
  currentSort = { key, asc };

  const sorted = [...allData].sort((a, b) =>
    asc ? a[key] - b[key] : b[key] - a[key]
  );

  renderTable(sorted);
}

/* 🔥 FILTROS CORREGIDOS */
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");

    const role = tab.dataset.role;

    if (role === "all") {
      renderTable([...allData].sort((a,b)=>a.pos-b.pos));
    } else {
      const filtered = allData
        .filter(i => i.roles.includes(role))
        .sort((a,b)=>a.pos-b.pos);

      renderTable(filtered);
    }
  });
});
</script>

</body>
</html>
