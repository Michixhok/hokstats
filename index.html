<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoKstats | v5.6 Fixed</title>
    <style>
        :root { --bg: #0b0e11; --card: #161b22; --brd: #30363d; --txt: #f0f6fc; --sec: #8b949e; --acc: #58a6ff; --btn-bg: #21262d; }
        body { background: var(--bg); color: var(--txt); font-family: system-ui, sans-serif; padding: 20px 10px; margin: 0; }
        
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        /* Contenedor maestro para alinear bordes izquierdo y derecho */
        .main-wrapper { width: 1000px; max-width: 95vw; display: flex; flex-direction: column; }

        /* Logo: Coincide con el borde izquierdo */
        .header { 
            margin-bottom: 25px; 
            border-left: 4px solid var(--acc); 
            padding-left: 12px; 
            display: flex; 
            align-items: baseline; 
            gap: 8px;
            align-self: flex-start;
        }
        .v-badge { background: #238636; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        /* Recuadro: Coincide con ambos bordes (izq/der) */
        .info-box { 
            background: rgba(88, 166, 255, 0.05); 
            border: 1px solid var(--brd); 
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 25px; 
            box-sizing: border-box; 
            display: flex;
            gap: 15px;
            align-items: center;
            width: 100%; 
        }
        .info-icon { font-size: 24px; color: var(--acc); }
        .info-text { font-size: 13px; color: var(--sec); line-height: 1.5; margin: 0; flex: 1; }

        /* Filtros */
        .filter-container { display: flex; justify-content: center; width: 100%; margin-bottom: 25px; }
        .filter-bar { display: flex; background: var(--card); border: 1px solid var(--brd); border-radius: 8px; padding: 4px; gap: 4px; }
        .filter-btn { background: transparent; border: none; color: var(--sec); padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
        .filter-btn.active { background: var(--acc); color: #fff; }

        /* Tabla: Ocupa el 100% del wrapper */
        table { width: 100%; border-collapse: separate; border-spacing: 0 2px; table-layout: fixed; }
        th { color: var(--sec); font-size: 10px; text-transform: uppercase; padding: 6px 10px; text-align: center; }
        th.w-hero { text-align: left; width: 180px; } 

        tr.hero-row td { background: var(--card); padding: 5px 15px; border-top: 1px solid var(--brd); border-bottom: 1px solid var(--brd); vertical-align: middle; text-align: center; }
        tr.hero-row td:first-child { border-left: 1px solid var(--brd); border-radius: 6px 0 0 6px; text-align: left; }
        tr.hero-row td:last-child { border-right: 1px solid var(--brd); border-radius: 0 6px 6px 0; }

        .hero-info { display: flex; align-items: center; gap: 10px; }
        .img-main { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
        .img-mini { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; border: 1px solid var(--brd); }
        .name-txt { font-weight: 600; font-size: 13px; color: #fff; display: block; }
        .stat-txt { color: var(--sec); font-size: 12px; font-weight: 500; }
        .rel-flex { display: flex; gap: 5px; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-wrapper">
            <div class="header">
                <h1 style="margin:0; font-size: 20px;">HoKstats</h1>
                <span class="v-badge">v5.6</span>
            </div>

            <div class="info-box">
                <div class="info-icon">💡</div>
                <p class="info-text">Este es un proyecto personal desarrollado originalmente para optimizar mi rendimiento en <strong>Honor of Kings</strong>. Independiente y basado en datos públicos.</p>
            </div>

            <div class="filter-container">
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="filterHeroes('Todo', this)">Todo</button>
                    <button class="filter-btn" onclick="filterHeroes('Choque', this)">Choque</button>
                    <button class="filter-btn" onclick="filterHeroes('Cazador', this)">Cazador</button>
                    <button class="filter-btn" onclick="filterHeroes('Medio', this)">Medio</button>
                    <button class="filter-btn" onclick="filterHeroes('Merodeo', this)">Merodeo</button>
                    <button class="filter-btn" onclick="filterHeroes('Farmeo', this)">Farmeo</button>
                </div>
            </div>

            <table id="heroTable">
                <thead>
                    <tr>
                        <th class="w-hero">Héroe</th>
                        <th style="width:110px">Roles</th>
                        <th style="width:120px">Tasa Victoria</th>
                        <th style="width:120px">Tasa Selección</th>
                        <th style="width:120px">Tasa Baneo</th>
                        <th style="width:105px">Sinergia</th>
                        <th style="width:105px">Fuerte</th>
                        <th style="width:105px">Débil</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + Date.now();

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').map(line => {
                    const parts = []; let curr = '', q = false;
                    for (let c of line) { if (c === '"') q = !q; else if (c === ',' && !q) { parts.push(curr); curr = ''; } else curr += c; }
                    parts.push(curr); return parts;
                });

                const body = document.getElementById('table-body');
                rows.slice(1).forEach(row => {
                    if (!row[1]) return;
                    const d = { 
                        n: row[1], img: row[3], type: row[4], r1: row[5],
                        win: row[8], pick: row[9], ban: row[10],
                        s1: row[13], s2: row[16], f1: row[19], f2: row[22], d1: row[25], d2: row[28]
                    };

                    const imgTag = (url) => (url && url.includes('http')) ? `<img src="${url.trim()}" class="img-mini" onerror="this.style.display='none'">` : "";

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.setAttribute('data-roles', d.r1);
                    tr.innerHTML = `
                        <td><div class="hero-info"><img src="${d.img}" class="img-main"><div><span class="name-txt">${d.n}</span><small style="color:var(--sec)">${d.type}</small></div></div></td>
                        <td><span class="stat-txt">${d.r1}</span></td>
                        <td><span class="stat-txt">${d.win}</span></td>
                        <td><span class="stat-txt">${d.pick}</span></td>
                        <td><span class="stat-txt">${d.ban}</span></td>
                        <td><div class="rel-flex">${imgTag(d.s1)}${imgTag(d.s2)}</div></td>
                        <td><div class="rel-flex">${imgTag(d.f1)}${imgTag(d.f2)}</div></td>
                        <td><div class="rel-flex">${imgTag(d.d1)}${imgTag(d.d2)}</div></td>
                    `;
                    body.appendChild(tr);
                });
            } catch (e) { console.error(e); }
        }

        function filterHeroes(role, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.hero-row').forEach(row => {
                row.style.display = (role === 'Todo' || row.getAttribute('data-roles').includes(role)) ? '' : 'none';
            });
        }
        load();
    </script>
</body>
</html>
