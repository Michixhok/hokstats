<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOKStats | Meta Analysis</title>
    <style>
        :root {
            --bg-body: #0b0e11;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #e6edf3;
            --text-sec: #8b949e;
            --accent: #58a6ff;
            --win: #3fb950;
        }

        body { 
            background: var(--bg-body); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            padding: 40px;
            margin: 0;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .header-section { margin-bottom: 30px; border-left: 4px solid var(--accent); padding-left: 15px; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; table-layout: fixed; }
        
        /* Alineación precisa de títulos */
        th { 
            color: var(--text-sec); 
            font-size: 11px; 
            text-transform: uppercase; 
            padding: 10px 15px; /* Mismo padding que las celdas */
            font-weight: 600;
            text-align: left;
        }

        /* Definición de anchos para que no bailen las columnas */
        .col-hero { width: 18%; }
        .col-role { width: 8%; }
        .col-stat { width: 10%; }
        .col-pair { width: 12%; }

        tr.hero-row td {
            background: var(--bg-card);
            padding: 16px 15px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tr.hero-row td:first-child { border-left: 1px solid var(--border); border-radius: 8px 0 0 8px; }
        tr.hero-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 8px 8px 0; }

        .hero-info { display: flex; flex-direction: column; }
        .hero-name { font-weight: bold; font-size: 15px; color: #fff; }
        .hero-type { color: var(--text-sec); font-size: 11px; margin-top: 2px; }

        .stat-label { display: block; font-size: 10px; color: var(--text-sec); text-transform: uppercase; margin-top: 4px; }
        .stat-val { font-weight: 600; font-size: 14px; }
        .win-val { color: var(--win); font-size: 16px; }

        .role-tag { font-size: 12px; color: var(--text-main); }
        .pair-list { font-size: 12px; line-height: 1.4; white-space: normal !important; }
        .red-text { color: #f85149; }
        .blue-text { color: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1 style="margin:0; font-size: 24px;">HOKStats</h1>
            <span style="color: var(--text-sec);">Meta Analysis & Database</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="col-hero">Héroe</th>
                    <th class="col-role">Rol 1</th>
                    <th class="col-role">Rol 2</th>
                    <th class="col-role">Rol 3</th>
                    <th class="col-stat">Win Rate</th>
                    <th class="col-stat">Pick</th>
                    <th class="col-stat">Ban</th>
                    <th class="col-pair">Sinergias</th>
                    <th class="col-pair">Fuerte vs</th>
                    <th class="col-pair">Débil vs</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv';

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                const tableBody = document.getElementById('table-body');
                
                rows.slice(1).forEach(col => {
                    if (!col[1] || col[1].trim() === "") return;
                    const clean = (v) => (v && v.trim() !== "-" && v.trim() !== "" && v.trim() !== "0.00%") ? v : "";

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.innerHTML = `
                        <td>
                            <div class="hero-info">
                                <span class="hero-name">${col[1]}</span>
                                <span class="hero-type">${col[3]}</span>
                            </div>
                        </td>
                        <td class="role-tag">${clean(col[4])}</td>
                        <td class="role-tag">${clean(col[5])}</td>
                        <td class="role-tag">${clean(col[6])}</td>
                        <td>
                            <span class="stat-val win-val">${col[7]}</span>
                            <span class="stat-label">Win Rate</span>
                        </td>
                        <td>
                            <span class="stat-val">${col[8]}</span>
                            <span class="stat-label">Pick</span>
                        </td>
                        <td>
                            <span class="stat-val">${col[9]}</span>
                            <span class="stat-label">Ban</span>
                        </td>
                        <td class="pair-list">
                            <div>${clean(col[10])}</div>
                            <div>${clean(col[12])}</div>
                        </td>
                        <td class="pair-list blue-text">
                            <div>${clean(col[14])}</div>
                            <div>${clean(col[16])}</div>
                        </td>
                        <td class="pair-list red-text">
                            <div>${clean(col[18])}</div>
                            <div>${clean(col[20])}</div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error(e); }
        }
        load();
    </script>
</body>
</html>
