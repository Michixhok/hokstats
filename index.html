<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List HoK</title>

<style>
body {
  background: #1c1c1f;
  font-family: Arial, sans-serif;
  color: #7b7a8e;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

/* 🔥 NUEVA CAJA CONTENEDORA (CLAVE) */
.tabs-wrapper {
  background: #31313c;
  padding: 8px;
  border: 1px solid #3a3a46;
  border-radius: 6px;
  margin-bottom: 10px;
}

/* TABS */
.tabs {
  display: flex;
  background: #282830;
  border-radius: 4px;
  overflow: hidden;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  cursor: pointer;
  border-right: 1px solid #3a3a46;
}

.tab:last-child {
  border-right: none;
}

.tab.active {
  background: #4f6edb;
  color: white;
  font-weight: bold;
}

/* TABLA */
table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: #282830;
}

th {
  padding: 8px 10px;
  font-size: 13px;
  text-align: left;
  color: #7b7a8e;
  cursor: pointer;
}

tbody tr {
  background: #31313c;
  border-top: 1px solid #282830;
  height: 52px;
}

tbody tr:hover {
  background: #3a3a46;
}

td {
  padding: 6px 10px;
}

.rank {
  width: 40px;
  text-align: center;
}

.champion {
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
}

.champion img {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  object-fit: cover;
}

.champion span {
  font-size: 13px;
  font-weight: bold;
}

.tier-badge {
  background: #2f80ed;
  color: white;
  font-weight: bold;
  padding: 3px 6px;
  border-radius: 6px;
  width: 22px;
  margin: auto;
  text-align: center;
}

.stat {
  text-align: center;
  font-size: 12px;
}

.role-cell {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 10px;
  height: 32px;
}
</style>
</head>

<body>

<div class="container">

  <!-- 🔥 CONTENEDOR CORRECTO -->
  <div class="tabs-wrapper">
    <div class="tabs">
      <div class="tab active" data-role="all">Todo</div>
      <div class="tab" data-role="Choque">Choque</div>
      <div class="tab" data-role="Cazador">Cazador</div>
      <div class="tab" data-role="Medio">Medio</div>
      <div class="tab" data-role="Merodeo">Merodeo</div>
      <div class="tab" data-role="Farmeo">Farmeo</div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Héroe</th>
        <th>Tier</th>
        <th>Rol</th>
        <th onclick="sortTable('win')">Win Rate</th>
        <th onclick="sortTable('pick')">Pick Rate</th>
        <th onclick="sortTable('ban')">Ban Rate</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv";

let allData = [];
let currentSort = { key: null, asc: false };

function parseCSV(text) {
  const rows = [];
  let row = [], current = '', insideQuotes = false;

  for (let char of text) {
    if (char === '"') insideQuotes = !insideQuotes;
    else if (char === ',' && !insideQuotes) {
      row.push(current); current = '';
    } else if (char === '\n' && !insideQuotes) {
      row.push(current); rows.push(row);
      row = []; current = '';
    } else current += char;
  }

  row.push(current);
  rows.push(row);
  return rows;
}

fetch(CSV_URL)
  .then(res => res.text())
  .then(csv => {
    const data = parseCSV(csv).slice(1);

    data.forEach(cols => {
      const nombre = cols[1];
      if (!nombre) return;

      allData.push({
        nombre,
        imagen: cols[3],
        roles: [cols[5], cols[6], cols[7]].filter(r => r),
        win: parseFloat(cols[8]),
        pick: parseFloat(cols[9]),
        ban: parseFloat(cols[10])
      });
    });

    renderTable(allData);
  });

function renderTable(data) {
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach((item, index) => {

    const rolesHTML = item.roles.map(r => `<div>${r}</div>`).join("");

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="rank">${index + 1}</td>
      <td>
        <div class="champion">
          <img src="${item.imagen}" onerror="this.style.display='none'">
          <span>${item.nombre}</span>
        </div>
      </td>
      <td class="stat"><div class="tier-badge">1</div></td>
      <td class="stat"><div class="role-cell">${rolesHTML}</div></td>
      <td class="stat">${item.win}%</td>
      <td class="stat">${item.pick}%</td>
      <td class="stat">${item.ban}%</td>
    `;

    tbody.appendChild(tr);
  });
}

function sortTable(key) {
  const asc = currentSort.key === key ? !currentSort.asc : false;
  currentSort = { key, asc };

  const sorted = [...allData].sort((a, b) =>
    asc ? a[key] - b[key] : b[key] - a[key]
  );

  renderTable(sorted);
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");

    const role = tab.dataset.role;

    if (role === "all") {
      renderTable(allData);
    } else {
      const filtered = allData.filter(item =>
        item.roles.includes(role)
      );
      renderTable(filtered);
    }
  });
});
</script>

</body>
</html>
