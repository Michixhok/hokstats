<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOKStats | Meta Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Rajdhani', sans-serif; }
        .table-container { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
        .hero-img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #58a6ff; object-fit: cover; }
        .mini-img { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #30363d; margin: 0 2px; }
        .wr-text { color: #3fb950; font-weight: bold; }
        tr { border-bottom: 1px solid #21262d; transition: 0.2s; }
        tr:hover { background-color: #1c2128; border-left: 4px solid #58a6ff; }
        th { background-color: #21262d; color: #8b949e; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body class="p-4 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-[#58a6ff]">HOKSTATS <span class="text-white font-light text-xl italic">CHILE</span></h1>
            <input type="text" id="search" placeholder="Filtrar por héroe o rol..." 
                   class="bg-[#0d1117] border border-[#30363d] px-4 py-2 rounded-full text-sm focus:ring-2 focus:ring-[#58a6ff] outline-none w-72">
        </div>

        <div class="table-container shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr>
                        <th class="p-4">Héroe</th>
                        <th class="p-4">Tipo</th>
                        <th class="p-4 text-center">Win Rate</th>
                        <th class="p-4 text-center">Sinergias</th>
                        <th class="p-4 text-center">Counters</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv';

        async function init() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            // Función para procesar CSV con comas dentro de celdas
            const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            const data = rows.slice(1).map(cols => ({
                name: cols[1]?.replace(/"/g, ''),
                img: cols[2]?.replace(/"/g, ''),
                type: cols[3]?.replace(/"/g, ''),
                wr: cols[8]?.replace(/"/g, ''),
                s1: cols[11]?.replace(/"/g, ''), // Columna Sinergia 1
                s2: cols[13]?.replace(/"/g, ''), // Columna Sinergia 2
                c1: cols[19]?.replace(/"/g, ''), // Columna Counter 1
                c2: cols[21]?.replace(/"/g, '')  // Columna Counter 2
            })).filter(h => h.name);

            window.heroes = data;
            render(data);
        }

        function render(list) {
            document.getElementById('table-body').innerHTML = list.map(h => `
                <tr>
                    <td class="p-4 flex items-center gap-4">
                        <img src="${h.img}" class="hero-img" onerror="this.src='https://via.placeholder.com/40/333/fff?text=?'">
                        <span class="text-white font-bold text-lg">${h.name}</span>
                    </td>
                    <td class="p-4 text-sm text-gray-400">${h.type}</td>
                    <td class="p-4 text-center wr-text text-lg">${h.wr}</td>
                    <td class="p-4 text-center">
                        <img src="${h.s1}" class="mini-img inline" onerror="this.style.display='none'">
                        <img src="${h.s2}" class="mini-img inline" onerror="this.style.display='none'">
                    </td>
                    <td class="p-4 text-center">
                        <img src="${h.c1}" class="mini-img inline border-red-900" onerror="this.style.display='none'">
                        <img src="${h.c2}" class="mini-img inline border-red-900" onerror="this.style.display='none'">
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            render(window.heroes.filter(h => h.name.toLowerCase().includes(val) || h.type.toLowerCase().includes(val)));
        });

        init();
    </script>
</body>
</html>
