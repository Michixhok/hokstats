<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOKStats | v3.2.1 Stable</title>
    <style>
        :root {
            --bg-body: #0b0e11;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-sec: #8b949e;
            --accent: #58a6ff;
        }

        body { 
            background: var(--bg-body); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 30px; margin: 0;
        }

        .container { max-width: 1350px; margin: 0 auto; }

        .header-section { 
            margin-bottom: 20px; border-left: 4px solid var(--accent); 
            padding-left: 15px; display: flex; align-items: baseline; gap: 12px;
        }
        .version-badge {
            background: #238636; color: white; font-size: 9px;
            padding: 2px 6px; border-radius: 10px; font-weight: bold;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; }
        
        th { 
            color: var(--text-sec); font-size: 10px; text-transform: uppercase; 
            padding: 8px 15px; font-weight: 600; text-align: left;
        }

        /* Anchos exactos de la v3.1 para evitar saltos */
        .col-hero { width: 18%; }
        .col-role { width: 7%; }
        .col-stat { width: 8%; }
        .col-pair { width: 11%; }

        tr.hero-row td {
            background: var(--bg-card); padding: 12px 15px;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            vertical-align: middle; overflow: hidden;
        }

        tr.hero-row td:first-child { border-left: 1px solid var(--border); border-radius: 6px 0 0 6px; }
        tr.hero-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 6px 6px 0; }

        /* Estilo de Imagen - Asegura que el link no se vea */
        .img-wrapper { display: flex; align-items: center; gap: 10px; }
        .hero-img { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; flex-shrink: 0; }
        .icon-rel { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; }

        .rel-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .hero-name { font-weight: bold; font-size: 14px; color: #fff; line-height: 1.2; }
        .hero-type { color: var(--text-sec); font-size: 10px; display: block; }
        .stat-val { font-weight: 600; font-size: 13px; color: #fff; }

        .blue { color: var(--accent); }
        .red { color: #f85149; }
        .name-small { font-size: 11px; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1 style="margin:0; font-size: 20px;">HOKStats</h1>
            <span class="version-badge">Build v3.2.1</span>
            <span style="color: var(--text-sec); font-size: 12px;">| Meta Database Chile</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="col-hero">Héroe / Tipo</th>
                    <th class="col-role">Rol 1</th>
                    <th class="col-role">Rol 2</th>
                    <th class="col-role">Rol 3</th>
                    <th class="col-stat">Win Rate</th>
                    <th class="col-stat">Pick Rate</th>
                    <th class="col-stat">Ban Rate</th>
                    <th class="col-pair">Sinergias</th>
                    <th class="col-pair">Fuerte vs</th>
                    <th class="col-pair">Débil vs</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + new Date().getTime();

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                // Separación robusta para manejar comas dentro de links
                const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                const tableBody = document.getElementById('table-body');
                
                rows.slice(1).forEach(col => {
                    if (!col[1] || col[1].trim() === "") return;

                    // Función de limpieza específica para URLs y Texto
                    const clean = (val) => {
                        if (!val) return "";
                        let s = val.trim().replace(/^"|"$/g, '');
                        return (s === "-" || s === "0.00%" || s === "#N/A") ? "" : s;
                    };

                    // EXTRACCIÓN DE IMÁGENES (Solo se usan en el atributo src)
                    const imgHero = clean(col[3]);   // Col D
                    const imgS1 = clean(col[13]);    // Col N
                    const imgS2 = clean(col[16]);    // Col Q
                    const imgF1 = clean(col[19]);    // Col T
                    const imgF2 = clean(col[22]);    // Col W
                    const imgD1 = clean(col[25]);    // Col Z
                    const imgD2 = clean(col[28]);    // Col AC

                    const renderRel = (name, img) => {
                        if (!name) return "";
                        return `<div class="rel-item">
                            <img src="${img}" class="icon-rel" onerror="this.style.display='none'">
                            <span class="name-small">${name}</span>
                        </div>`;
                    };

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.innerHTML = `
                        <td>
                            <div class="img-wrapper">
                                <img src="${imgHero}" class="hero-img" onerror="this.src='https://www.honorofkings.com/global/images/hero/hero_list_default.png'">
                                <div>
                                    <span class="hero-name">${col[1]}</span>
                                    <span class="hero-type">${col[2]}</span>
                                </div>
                            </div>
                        </td>
                        <td class="role-text">${clean(col[4])}</td>
                        <td class="role-text">${clean(col[5])}</td>
                        <td class="role-text">${clean(col[6])}</td>
                        <td><span class="stat-val">${col[7]}</span></td>
                        <td><span class="stat-val">${col[8]}</span></td>
                        <td><span class="stat-val">${col[9]}</span></td>
                        <td>${renderRel(clean(col[10]), imgS1)}${renderRel(clean(col[12]), imgS2)}</td>
                        <td class="blue">${renderRel(clean(col[14]), imgF1)}${renderRel(clean(col[16]), imgF2)}</td>
                        <td class="red">${renderRel(clean(col[18]), imgD1)}${renderRel(clean(col[20]), imgD2)}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error("Error cargando datos:", e); }
        }
        load();
    </script>
</body>
</html>
