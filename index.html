<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List HoK</title>

<style>
body {
  background: #1c1c1f;
  font-family: Arial, sans-serif;
  color: #7b7a8e;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.main-box {
  background: #31313c;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid #1c1c1f;
}

.tabs-container {
  padding: 10px;
  background: #31313c;
  border-bottom: 1px solid #1c1c1f;
}

.tabs {
  display: grid;
  grid-template-columns: repeat(6, 1fr); /* 🔥 6 botones exactos */
  width: 100%;
  border: 1px solid #444452;
  border-radius: 4px;
  overflow: hidden;
}

/* 🔥 FIX REAL */
.tab {
  text-align: center;
  padding: 8px 14px;
  cursor: pointer;
  border-right: 1px solid #444452;
  background: #31313c;
  font-size: 13px;
  font-weight: 500;
}

.tab:last-child {
  border-right: none;
}

.tab.active {
  color: white;
  background: #4f6edb;
  font-weight: 500; /* mismo peso → no rompe flex */
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

thead {
  background: #282830;
}

thead tr {
  border-bottom: 1px solid #1c1c1f;
}

th {
  padding: 8px 12px;
  font-size: 13px;
  color: #7b7a8e;
  font-weight: normal;
  cursor: pointer;
}

tbody tr {
  background: #31313c;
  border-top: 1px solid #1c1c1f;
  border-bottom: 1px solid #1c1c1f;
}

tbody tr:hover {
  background: #3a3a46;
}

td {
  padding: 6px 12px;
}

.col-hero { width: 22%; }
.col-tier { width: 8%; text-align:center; }
.col-rol  { width: 12%; text-align:center; }
.col-stat { width: 12%; text-align:center; }
.col-syn  { width: 12%; text-align:center; }
.col-weak { width: 14%; text-align:center; }

.champion {
  display: flex;
  align-items: center;
  gap: 12px;
  color: white;
  padding-left: 8px;
}

.champion img {
  width: 36px;
  height: 36px;
  border-radius: 6px;
}

.champion span {
  font-size: 13px;
  font-weight: bold;
}

.tier-badge {
  width: 20px;
  height: 20px;
  margin: auto;
  transform: rotate(45deg);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #1c1c1f;
}

.tier-badge span {
  transform: rotate(-45deg);
  color: white;
  font-weight: bold;
  font-size: 10px;
}

.tier-S { background: #1c7ed6; }
.tier-A { background: #099268; }
.tier-B { background: #ff922b; }
.tier-C { background: #868e96; }

.stat {
  font-size: 12px;
  color: #a0a0b5;
}

.role-cell {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 9px;
  height: 32px;
  gap: 2px;
  color: #a0a0b5;
}

.synergy-cell {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
}

.synergy-cell img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="container">
  <div class="main-box">

    <div class="tabs-container">
      <div class="tabs">
        <div class="tab active" data-role="all">Todo</div>
        <div class="tab" data-role="Choque">Choque</div>
        <div class="tab" data-role="Cazador">Cazador</div>
        <div class="tab" data-role="Medio">Medio</div>
        <div class="tab" data-role="Merodeo">Merodeo</div>
        <div class="tab" data-role="Farmeo">Farmeo</div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th class="col-hero">Héroe</th>
          <th class="col-tier" onclick="sortTable('pos')">Tier</th>
          <th class="col-rol">Rol</th>
          <th class="col-stat" onclick="sortTable('win')">Win rate</th>
          <th class="col-stat" onclick="sortTable('pick')">Pick rate</th>
          <th class="col-stat" onclick="sortTable('ban')">Ban rate</th>
          <th class="col-syn">Sinergia con</th>
          <th class="col-weak">Fuerte contra</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv";

let allData = [];
let currentSort = { key: null, asc: false };

function cleanNumber(val){
  const num = parseFloat(val);
  return isNaN(num) ? 0 : num;
}

function safeSort(a, b) {
  return a.pos - b.pos;
}

function parseCSV(text) {
  return text.split("\n").map(r => r.split(","));
}

fetch(CSV_URL)
.then(r => r.text())
.then(csv => {
  const data = parseCSV(csv).slice(1);

  data.forEach(cols => {
    if (!cols[1]) return;

    allData.push({
      nombre: cols[1],
      imagen: cols[3],
      roles: [cols[5], cols[6], cols[7]].filter(Boolean),
      win: cleanNumber(cols[8]),
      pick: cleanNumber(cols[9]),
      ban: cleanNumber(cols[10]),
      tier: cols[29],
      pos: cleanNumber(cols[30]),

      syn: [
        {img: cols[13], name: cols[11]},
        {img: cols[16], name: cols[14]}
      ],

      weak: [
        {img: cols[19], name: cols[17]},
        {img: cols[22], name: cols[20]}
      ]
    });
  });

  renderTable([...allData].sort(safeSort));
});

function renderIcons(arr){
  return arr
    .filter(x => x.img && x.img !== "#N/A")
    .map(x => `<img src="${x.img}" title="${x.name}">`)
    .join("");
}

function renderTable(data) {
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach(item => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="col-hero">
        <div class="champion">
          <img src="${item.imagen}">
          <span>${item.nombre}</span>
        </div>
      </td>

      <td class="col-tier">
        <div class="tier-badge tier-${item.tier}">
          <span>${item.tier}</span>
        </div>
      </td>

      <td class="col-rol">
        <div class="role-cell">${item.roles.map(r=>`<div>${r}</div>`).join("")}</div>
      </td>

      <td class="col-stat stat">${item.win}%</td>
      <td class="col-stat stat">${item.pick}%</td>
      <td class="col-stat stat">${item.ban}%</td>

      <td class="col-syn"><div class="synergy-cell">${renderIcons(item.syn)}</div></td>
      <td class="col-weak"><div class="synergy-cell">${renderIcons(item.weak)}</div></td>
    `;

    tbody.appendChild(tr);
  });
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");

    const role = tab.dataset.role;

    const filtered = role === "all"
      ? allData
      : allData.filter(i => i.roles.includes(role));

    renderTable(filtered);
  });
});

function sortTable(key) {
  const asc = currentSort.key === key ? !currentSort.asc : false;
  currentSort = { key, asc };

  const sorted = [...allData].sort((a, b) =>
    asc ? a[key] - b[key] : b[key] - a[key]
  );

  renderTable(sorted);
}
</script>

</body>
</html>
