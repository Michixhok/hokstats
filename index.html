<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOKStats | Estructura Final</title>
    <style>
        body { background: #0b0e14; color: #e1e1e1; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #161b22; }
        th { background: #1f232c; color: #58a6ff; text-align: left; padding: 12px; border-bottom: 2px solid #30363d; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #21262d; font-size: 13px; }
        .win { color: #3fb950; font-weight: bold; }
        .hero { font-weight: bold; color: #fff; }
        .pair { display: block; font-size: 12px; margin-bottom: 4px; }
    </style>
</head>
<body>
    <h2>HOKStats - Verificación de Datos</h2>
    <table>
        <thead>
            <tr>
                <th>Héroe</th>
                <th>Tipo/Roles</th>
                <th>Win Rate</th>
                <th>Pick/Ban</th>
                <th>Sinergias</th>
                <th>Fuerte contra</th>
                <th>Débil contra</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv';

        async function loadData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                // Regex para no romper nombres con comas
                const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                
                const tableBody = document.getElementById('table-body');
                tableBody.innerHTML = '';

                rows.slice(1).forEach(col => {
                    if (!col[1] || col[1].trim() === "") return;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="hero">${col[1]}</td>
                        <td>${col[3]}<br><small style="color:#8b949e">${col[4]}, ${col[5]}</small></td>
                        <td class="win">${col[7]}</td>
                        <td>P: ${col[8]}<br>B: ${col[9]}</td>
                        <td>
                            <span class="pair">1. ${col[10] || '-'}</span>
                            <span class="pair">2. ${col[12] || '-'}</span>
                        </td>
                        <td style="color: #58a6ff">
                            <span class="pair">1. ${col[14] || '-'}</span>
                            <span class="pair">2. ${col[16] || '-'}</span>
                        </td>
                        <td style="color: #ff7b72">
                            <span class="pair">1. ${col[18] || '-'}</span>
                            <span class="pair">2. ${col[20] || '-'}</span>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error(e); }
        }
        loadData();
    </script>
</body>
</html>
