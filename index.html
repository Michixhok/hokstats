<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOKStats | v3.2 revisada</title>
    <style>
        :root {
            --bg-body: #0b0e11;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-sec: #8b949e;
            --accent: #58a6ff;
        }

        body { 
            background: var(--bg-body); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 30px;
            margin: 0;
        }

        .container { max-width: 1350px; margin: 0 auto; }

        .header-section { 
            margin-bottom: 20px; 
            border-left: 4px solid var(--accent); 
            padding-left: 15px;
            display: flex;
            align-items: baseline; gap: 12px;
        }
        .version-badge {
            background: #238636; color: white; font-size: 9px;
            padding: 2px 6px; border-radius: 10px; font-weight: bold;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; }
        
        th { 
            color: var(--text-sec); font-size: 10px; text-transform: uppercase; 
            padding: 8px 15px; font-weight: 600; text-align: left;
        }

        .col-hero { width: 15%; }
        .col-role { width: 7%; }
        .col-stat { width: 8%; }
        .col-pair { width: 11%; }

        tr.hero-row td {
            background: var(--bg-card); padding: 10px 15px;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr.hero-row td:first-child { border-left: 1px solid var(--border); border-radius: 6px 0 0 6px; }
        tr.hero-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 6px 6px 0; }

        /* Avatares */
        .img-hero { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); }
        .img-rel { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border); }
        
        .flex-cell { display: flex; align-items: center; gap: 10px; }
        .rel-item { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px; }

        .hero-name { font-weight: bold; font-size: 14px; color: #fff; }
        .hero-type { color: var(--text-sec); font-size: 10px; display: block; }
        .role-text { color: var(--text-sec); font-size: 10px; }
        .stat-val { font-weight: 600; font-size: 13px; color: #fff; }

        .blue { color: var(--accent); }
        .red { color: #f85149; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1 style="margin:0; font-size: 20px;">HOKStats</h1>
            <span class="version-badge">Build v3.2</span>
            <span style="color: var(--text-sec); font-size: 12px;">| Meta Database Chile</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="col-hero">Héroe / Tipo</th>
                    <th class="col-role">Rol 1</th>
                    <th class="col-role">Rol 2</th>
                    <th class="col-role">Rol 3</th>
                    <th class="col-stat">Win Rate</th>
                    <th class="col-stat">Pick Rate</th>
                    <th class="col-stat">Ban Rate</th>
                    <th class="col-pair">Sinergias</th>
                    <th class="col-pair">Fuerte vs</th>
                    <th class="col-pair">Débil vs</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + new Date().getTime();

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                const tableBody = document.getElementById('table-body');
                
                rows.slice(1).forEach(col => {
                    if (!col[1] || col[1].trim() === "") return;
                    const clean = (v) => (v && v.trim() !== "-" && v.trim() !== "" && v.trim() !== "0.00%") ? v.replace(/"/g, '').trim() : "";

                    // Mapeo exacto según tus instrucciones (A=0, B=1, C=2, D=3...)
                    const imgHero = clean(col[3]);
                    const sin1Img = clean(col[13]), sin1Name = clean(col[10]);
                    const sin2Img = clean(col[16]), sin2Name = clean(col[12]);
                    const fte1Img = clean(col[19]), fte1Name = clean(col[14]);
                    const fte2Img = clean(col[22]), fte2Name = clean(col[16]);
                    const dbl1Img = clean(col[25]), dbl1Name = clean(col[18]);
                    const dbl2Img = clean(col[28]), dbl2Name = clean(col[20]);

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    
                    const renderRel = (img, name) => name ? `<div class="rel-item"><img src="${img}" class="img-rel" onerror="this.style.display='none'"><span>${name}</span></div>` : "";

                    tr.innerHTML = `
                        <td>
                            <div class="flex-cell">
                                <img src="${imgHero}" class="img-hero" onerror="this.src='https://www.honorofkings.com/global/images/hero/hero_list_default.png'">
                                <div><span class="hero-name">${col[1]}</span><span class="hero-type">${col[3]}</span></div>
                            </div>
                        </td>
                        <td class="role-text">${clean(col[4])}</td>
                        <td class="role-text">${clean(col[5])}</td>
                        <td class="role-text">${clean(col[6])}</td>
                        <td><span class="stat-val">${col[7]}</span></td>
                        <td><span class="stat-val">${col[8]}</span></td>
                        <td><span class="stat-val">${col[9]}</span></td>
                        <td>${renderRel(sin1Img, sin1Name)}${renderRel(sin2Img, sin2Name)}</td>
                        <td class="blue">${renderRel(fte1Img, fte1Name)}${renderRel(fte2Img, fte2Name)}</td>
                        <td class="red">${renderRel(dbl1Img, dbl1Name)}${renderRel(dbl2Img, dbl2Name)}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error("Error:", e); }
        }
        load();
    </script>
</body>
</html>
