<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOKStats | v3.4.1</title>
    <style>
        :root {
            --bg-body: #0b0e11;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-sec: #8b949e;
            --accent: #58a6ff;
        }

        body { 
            background: var(--bg-body); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 25px; margin: 0;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .header { 
            margin-bottom: 20px; border-left: 4px solid var(--accent); 
            padding-left: 15px; display: flex; align-items: baseline; gap: 10px;
        }
        .v-badge { background: #238636; color: white; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: bold; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; }
        
        th { color: var(--text-sec); font-size: 10px; text-transform: uppercase; padding: 10px; text-align: left; }

        /* Anchos estables v3.1 */
        .w-hero { width: 16%; }
        .w-role { width: 7%; }
        .w-stat { width: 8%; }
        .w-rel  { width: 12%; }

        tr.hero-row td {
            background: var(--bg-card); padding: 10px 15px;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr.hero-row td:first-child { border-left: 1px solid var(--border); border-radius: 8px 0 0 8px; }
        tr.hero-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 8px 8px 0; }

        .hero-flex { display: flex; align-items: center; gap: 12px; }
        .img-main { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }
        .img-mini { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }

        .rel-box { display: flex; flex-direction: column; gap: 6px; }
        .rel-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        
        .hero-name { font-weight: bold; font-size: 14px; color: #fff; display: block; }
        .hero-type { color: var(--text-sec); font-size: 10px; }
        .stat-val { font-weight: 600; font-size: 13px; color: #fff; }

        .blue { color: var(--accent); }
        .red { color: #f85149; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 20px;">HOKStats</h1>
            <span class="v-badge">v3.4.1</span>
            <span style="color: var(--text-sec); font-size: 12px;">| Database Chile</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="w-hero">Héroe</th>
                    <th class="w-role">Rol 1</th>
                    <th class="w-role">Rol 2</th>
                    <th class="w-role">Rol 3</th>
                    <th class="w-stat">Win</th>
                    <th class="w-stat">Pick</th>
                    <th class="w-stat">Ban</th>
                    <th class="w-rel">Sinergias</th>
                    <th class="w-rel">Fuerte vs</th>
                    <th class="w-rel">Débil vs</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + Date.now();

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                const tableBody = document.getElementById('table-body');
                
                rows.slice(1).forEach(col => {
                    if (!col[1] || col[1].trim() === "") return;

                    // FILTRO CRÍTICO: Si el dato es una URL, devuelve vacío para el texto
                    const cleanTxt = (v) => {
                        if (!v) return "";
                        let s = v.trim().replace(/^"|"$/g, '');
                        return (s.startsWith('http') || s === "-" || s === "0") ? "" : s;
                    };

                    const getImg = (v) => {
                        if (!v) return "";
                        let s = v.trim().replace(/^"|"$/g, '');
                        return s.startsWith('http') ? s : "";
                    };

                    const renderRel = (nameIdx, imgIdx) => {
                        const name = cleanTxt(col[nameIdx]);
                        const img = getImg(col[imgIdx]);
                        if (!name) return "";
                        return `<div class="rel-row">
                                    <img src="${img}" class="img-mini" onerror="this.style.visibility='hidden'">
                                    <span>${name}</span>
                                </div>`;
                    };

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.innerHTML = `
                        <td>
                            <div class="hero-flex">
                                <img src="${getImg(col[3])}" class="img-main" onerror="this.src='https://www.honorofkings.com/global/images/hero/hero_list_default.png'">
                                <div><span class="hero-name">${col[1]}</span><span class="hero-type">${cleanTxt(col[2])}</span></div>
                            </div>
                        </td>
                        <td style="font-size:10px; color:var(--text-sec)">${cleanTxt(col[4])}</td>
                        <td style="font-size:10px; color:var(--text-sec)">${cleanTxt(col[5])}</td>
                        <td style="font-size:10px; color:var(--text-sec)">${cleanTxt(col[6])}</td>
                        <td><span class="stat-val">${cleanTxt(col[7])}</span></td>
                        <td><span class="stat-val">${cleanTxt(col[8])}</span></td>
                        <td><span class="stat-val">${cleanTxt(col[9])}</span></td>
                        <td><div class="rel-box">${renderRel(10, 13)}${renderRel(12, 16)}</div></td>
                        <td class="blue"><div class="rel-box">${renderRel(14, 19)}${renderRel(16, 22)}</div></td>
                        <td class="red"><div class="rel-box">${renderRel(18, 25)}${renderRel(20, 28)}</div></td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error(e); }
        }
        load();
    </script>
</body>
</html>
