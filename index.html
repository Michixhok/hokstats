<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tier List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1f2937;
      color: #e5e7eb;
      margin: 0;
      padding: 20px;
    }

    .table-container {
      max-width: 1200px;
      margin: auto;
      background: #111827;
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #374151;
      text-align: left;
    }

    th, td {
      padding: 12px 10px;
      font-size: 14px;
    }

    th {
      color: #9ca3af;
      font-weight: 500;
    }

    tbody tr {
      border-bottom: 1px solid #374151;
    }

    tbody tr:hover {
      background: #1f2937;
    }

    .rank {
      width: 60px;
      text-align: center;
      font-weight: bold;
    }

    .champion {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .champion img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    .tier {
      font-weight: bold;
      color: #fbbf24;
    }

    .stat {
      text-align: center;
    }
  </style>
</head>
<body>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th class="rank">#</th>
        <th>Campeón</th>
        <th class="stat">Tier</th>
        <th class="stat">Win Rate</th>
        <th class="stat">Pick Rate</th>
        <th class="stat">Ban Rate</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td class="rank">1</td>
        <td>
          <div class="champion">
            <img src="https://via.placeholder.com/32" alt="">
            <span>Ahri</span>
          </div>
        </td>
        <td class="stat tier">S+</td>
        <td class="stat">52.3%</td>
        <td class="stat">18.1%</td>
        <td class="stat">12.4%</td>
      </tr>

      <tr>
        <td class="rank">2</td>
        <td>
          <div class="champion">
            <img src="https://via.placeholder.com/32" alt="">
            <span>Lee Sin</span>
          </div>
        </td>
        <td class="stat tier">S</td>
        <td class="stat">50.8%</td>
        <td class="stat">22.5%</td>
        <td class="stat">18.2%</td>
      </tr>
    </tbody>
  </table>
</div>

</body>
</html>
