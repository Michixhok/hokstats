<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOK Stats - Pro Table</title>
    <style>
        /* COLORES EXTRAÍDOS DIRECTAMENTE DEL HTML DE OP.GG (MODO OSCURO) */
        :root {
            --bg-page: #0e0e10;       /* Fondo del body */
            --bg-table: #171719;      /* Fondo de la tabla */
            --bg-header: #1c1c1f;     /* Fondo de las cabeceras */
            --brd-color: #2d2d31;     /* Color de bordes y líneas */
            --txt-main: #f5f5f5;      /* Blanco para nombres importantes */
            --txt-muted: #9e9eb1;     /* Gris para datos secundarios y headers */
            --op-blue: #5383e8;       /* Azul acento */
        }

        body {
            background-color: var(--bg-page);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--txt-main);
        }

        /* CONTENEDOR MAESTRO */
        .table-wrapper {
            width: 1000px;
            max-width: 98vw;
            margin: 0 auto;
            background-color: var(--bg-table);
            border: 1px solid var(--brd-color);
            border-radius: 4px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse; /* Elimina espacios entre filas */
            border-spacing: 0;
            table-layout: fixed;
        }

        /* CABECERAS */
        th {
            background-color: var(--bg-header);
            color: var(--txt-muted);
            font-size: 11px;
            font-weight: 600;
            height: 40px;
            padding: 0 16px;
            text-align: center;
            border-bottom: 1px solid var(--brd-color);
            text-transform: uppercase;
        }

        /* Alineación columna Héroe */
        th:first-child, td:first-child { 
            text-align: left !important; 
            width: 220px;
        }

        /* FILAS Y CELDAS */
        tr.hero-row td {
            height: 52px;
            padding: 0 16px;
            border-bottom: 1px solid var(--brd-color);
            color: var(--txt-muted); /* Por defecto datos en gris */
            font-size: 12px;
            vertical-align: middle;
            text-align: center;
        }

        tr.hero-row:hover {
            background-color: #1c1c21;
        }

        /* DISEÑO INTERNO CELDA HÉROE */
        .hero-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .img-main {
            width: 32px !important;
            height: 32px !important;
            border-radius: 4px;
            object-fit: cover;
        }

        .name-txt {
            color: var(--txt-main); /* Nombre en blanco */
            font-weight: 700;
        }

        /* GRUPO DE ICONOS (Counters y Sinergias) */
        .icon-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .icon-group img {
            width: 24px !important;
            height: 24px !important;
            border-radius: 50%;
            border: 1px solid var(--brd-color);
            object-fit: cover;
        }

        /* COLOR PARA WIN RATE ALTO */
        .win-rate-high {
            color: var(--op-blue);
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="table-wrapper">
    <table id="statsTable">
        <thead>
            <tr>
                <th>Héroe</th>
                <th>Win Rate</th>
                <th>Pick Rate</th>
                <th>Ban Rate</th>
                <th>Sinergias</th>
                <th>Counters</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv';

    async function loadStats() {
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();
            
            // Procesar filas (evitando que las comas internas en las listas de imágenes rompan todo)
            const rows = csvText.split('\n').slice(1); 
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            rows.forEach(row => {
                // Regex para separar por comas respetando lo que está entre comillas
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                
                if (cols.length < 5) return;

                const [nombre, imagen, winRate, pickRate, banRate, sinergias, counters] = cols;

                const tr = document.createElement('tr');
                tr.className = 'hero-row';
                
                // Función para limpiar y renderizar múltiples iconos
                const renderIcons = (str) => {
                    if (!str) return '';
                    // Divide por espacio o coma
                    return str.split(/[\s,]+/).map(url => `<img src="${url.trim()}">`).join('');
                };

                tr.innerHTML = `
                    <td>
                        <div class="hero-cell">
                            <img src="${imagen}" class="img-main">
                            <span class="name-txt">${nombre}</span>
                        </div>
                    </td>
                    <td class="${parseFloat(winRate) >= 51 ? 'win-rate-high' : ''}">${winRate}</td>
                    <td>${pickRate}</td>
                    <td>${banRate}</td>
                    <td><div class="icon-group">${renderIcons(sinergias)}</div></td>
                    <td><div class="icon-group">${renderIcons(counters)}</div></td>
                `;
                tableBody.appendChild(tr);
            });
        } catch (error) {
            console.error("Error al cargar los datos:", error);
        }
    }

    loadStats();
</script>

</body>
</html>
