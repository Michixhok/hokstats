<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoKstats | v8.1 Enhanced Charts</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #161b22; --brd: #30363d; --txt: #f0f6fc; --sec: #8b949e; --acc: #58a6ff; --grid: rgba(240, 246, 252, 0.05); }
        body { background: var(--bg); color: var(--txt); font-family: system-ui, sans-serif; padding: 20px 10px; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        .header { width: 1000px; max-width: 95vw; margin-bottom: 25px; border-left: 4px solid var(--acc); padding-left: 12px; display: flex; align-items: baseline; gap: 8px; }
        .v-badge { background: #238636; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        .main-tabs { display: flex; gap: 10px; width: 1000px; max-width: 95vw; margin-bottom: 20px; border-bottom: 1px solid var(--brd); padding-bottom: 10px; }
        .tab-btn { background: transparent; border: none; color: var(--sec); font-size: 16px; font-weight: 600; cursor: pointer; padding: 8px 16px; border-radius: 6px; }
        .tab-btn.active { color: var(--acc); background: rgba(88, 166, 255, 0.1); }

        .content-section { display: none; width: 1000px; max-width: 95vw; }
        .content-section.active { display: block; }

        .chart-container { background: var(--card); border: 1px solid var(--brd); border-radius: 12px; padding: 25px; position: relative; height: 650px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        
        /* Estilo de la tabla y controles se mantienen igual a v7.1 */
        .toolbar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 15px; }
        .filter-bar { display: flex; background: var(--card); border: 1px solid var(--brd); border-radius: 8px; padding: 4px; gap: 4px; }
        .filter-btn { background: transparent; border: none; color: var(--sec); padding: 8px 16px; cursor: pointer; border-radius: 6px; font-size: 13px; }
        .filter-btn.active { background: var(--acc); color: #fff; }
        .search-box { background: var(--card); border: 1px solid var(--brd); border-radius: 8px; padding: 0 12px; flex-grow: 1; max-width: 300px; display: flex; align-items: center; }
        .search-box input { background: transparent; border: none; color: var(--txt); padding: 10px 0; width: 100%; outline: none; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 2px; }
        tr.hero-row td { background: var(--card); padding: 10px; border-top: 1px solid var(--brd); border-bottom: 1px solid var(--brd); text-align: center; }
        .img-main { width: 38px; height: 38px; border-radius: 8px; }
        .tier-txt { font-size: 18px; font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 20px;">HoKstats</h1>
            <span class="v-badge">v8.1</span>
        </div>

        <div class="main-tabs">
            <button class="tab-btn active" onclick="switchTab('stats', this)">Estadísticas</button>
            <button class="tab-btn" onclick="switchTab('analytics', this)">Análisis Gráfico</button>
        </div>

        <div id="section-stats" class="content-section active">
            <div class="toolbar">
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="setFilter('Todo', this)">Todo</button>
                    <button class="filter-btn" onclick="setFilter('Choque', this)">Choque</button>
                    <button class="filter-btn" onclick="setFilter('Cazador', this)">Cazador</button>
                    <button class="filter-btn" onclick="setFilter('Medio', this)">Medio</button>
                    <button class="filter-btn" onclick="setFilter('Merodeo', this)">Merodeo</button>
                    <button class="filter-btn" onclick="setFilter('Farmeo', this)">Farmeo</button>
                </div>
                <div class="search-box">
                    <input type="text" id="heroSearch" placeholder="Buscar héroe..." onkeyup="applyFilters()">
                </div>
            </div>
            <table id="heroTable">
                <thead>
                    <tr>
                        <th style="text-align:left">Héroe</th>
                        <th>Tier</th>
                        <th>Win Rate</th>
                        <th>Pick Rate</th>
                        <th>Ban Rate</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div id="section-analytics" class="content-section">
            <div class="chart-container">
                <canvas id="scatterChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + Date.now();
        let heroData = [];
        let myChart = null;

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('section-' + tabId).classList.add('active');
            if(tabId === 'analytics') setTimeout(renderChart, 100);
        }

        function renderChart() {
            if(myChart) myChart.destroy();
            const ctx = document.getElementById('scatterChart').getContext('2d');
            
            const images = heroData.map(h => {
                const img = new Image();
                img.src = h.img;
                return img;
            });

            myChart = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: 'Héroes',
                        data: heroData.map(h => ({ x: h.pick, y: h.win, name: h.name })),
                        pointStyle: images,
                        pointRadius: 15
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            title: { display: true, text: 'Tasa de Selección (%)', color: '#8b949e', font: { weight: 'bold' } },
                            grid: { color: 'rgba(240, 246, 252, 0.1)', display: true },
                            ticks: { color: '#8b949e' }
                        },
                        y: {
                            title: { display: true, text: 'Tasa de Victoria (%)', color: '#8b949e', font: { weight: 'bold' } },
                            grid: { color: 'rgba(240, 246, 252, 0.1)', display: true },
                            ticks: { color: '#8b949e' },
                            suggestedMin: 45,
                            suggestedMax: 55
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    const h = context.raw;
                                    return `${h.name}: Win Rate ${h.y}% | Pick Rate ${h.x}%`;
                                }
                            }
                        }
                    }
                }
            });
        }

        async function load() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').map(line => {
                const parts = []; let curr = '', q = false;
                for (let c of line) { if (c === '"') q = !q; else if (c === ',' && !q) { parts.push(curr); curr = ''; } else curr += c; }
                parts.push(curr); return parts;
            });
            
            const body = document.getElementById('table-body');
            heroData = rows.slice(1).map(r => {
                if(!r[1]) return null;
                return {
                    name: r[1], img: r[3], win: parseFloat(r[8]) || 0,
                    pick: parseFloat(r[9]) || 0, ban: parseFloat(r[10]) || 0,
                    tier: r[29], roles: `${r[5]},${r[6]},${r[7]}`
                };
            }).filter(h => h);

            heroData.forEach(h => {
                const tr = document.createElement('tr');
                tr.className = 'hero-row';
                tr.setAttribute('data-roles', h.roles);
                tr.innerHTML = `
                    <td><div style="display:flex;align-items:center;gap:10px"><img src="${h.img}" class="img-main"><span>${h.name}</span></div></td>
                    <td><span class="tier-txt">${h.tier || '-'}</span></td>
                    <td>${h.win}%</td>
                    <td>${h.pick}%</td>
                    <td>${h.ban}%</td>
                `;
                body.appendChild(tr);
            });
        }

        function applyFilters() { /* Mismo código v7.1 */ }
        function setFilter(r, b) { /* Mismo código v7.1 */ }
        load();
    </script>
</body>
</html>
