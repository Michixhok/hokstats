<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOKStats | v3.2.2 Stable</title>
    <style>
        :root {
            --bg-body: #0b0e11;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-sec: #8b949e;
            --accent: #58a6ff;
        }

        body { 
            background: var(--bg-body); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 30px; margin: 0;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .header-section { 
            margin-bottom: 20px; border-left: 4px solid var(--accent); 
            padding-left: 15px; display: flex; align-items: baseline; gap: 12px;
        }
        .version-badge {
            background: #238636; color: white; font-size: 9px;
            padding: 2px 6px; border-radius: 10px; font-weight: bold;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; }
        
        th { 
            color: var(--text-sec); font-size: 10px; text-transform: uppercase; 
            padding: 8px 15px; font-weight: 600; text-align: left;
        }

        /* Anchos ajustados para que nada se desplace */
        .col-hero { width: 18%; }
        .col-role { width: 8%; }
        .col-stat { width: 7%; }
        .col-pair { width: 12%; }

        tr.hero-row td {
            background: var(--bg-card); padding: 10px 15px;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            vertical-align: middle; overflow: hidden;
        }

        tr.hero-row td:first-child { border-left: 1px solid var(--border); border-radius: 6px 0 0 6px; }
        tr.hero-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 6px 6px 0; }

        .hero-flex { display: flex; align-items: center; gap: 10px; }
        .img-main { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; }
        .img-mini { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; }

        .rel-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .hero-name { font-weight: bold; font-size: 14px; color: #fff; display: block; }
        .hero-type { color: var(--text-sec); font-size: 10px; display: block; }
        .stat-val { font-weight: 600; font-size: 13px; color: #fff; }

        .blue { color: var(--accent); }
        .red { color: #f85149; }
        .name-tag { font-size: 11px; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1 style="margin:0; font-size: 20px;">HOKStats</h1>
            <span class="version-badge">Build v3.2.2</span>
            <span style="color: var(--text-sec); font-size: 12px;">| Meta Database Chile</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="col-hero">Héroe / Tipo</th>
                    <th class="col-role">Rol 1</th>
                    <th class="col-role">Rol 2</th>
                    <th class="col-role">Rol 3</th>
                    <th class="col-stat">Win Rate</th>
                    <th class="col-stat">Pick Rate</th>
                    <th class="col-stat">Ban Rate</th>
                    <th class="col-pair">Sinergias</th>
                    <th class="col-pair">Fuerte vs</th>
                    <th class="col-pair">Débil vs</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + new Date().getTime();

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                const tableBody = document.getElementById('table-body');
                
                rows.slice(1).forEach(col => {
                    if (!col[1] || col[1].trim() === "") return;

                    const clean = (val) => {
                        if (!val) return "";
                        let s = val.trim().replace(/^"|"$/g, '');
                        return (s === "-" || s === "0.00%" || s === "#N/A" || s.startsWith("http")) ? "" : s;
                    };

                    const getImg = (val) => {
                        if (!val) return "";
                        let s = val.trim().replace(/^"|"$/g, '');
                        return s.startsWith("http") ? s : "";
                    };

                    // MAPEADO ESTRICTO PARA EVITAR DESPLAZAMIENTOS
                    const heroName = col[1];
                    const heroType = col[2]; 
                    const heroImg  = getImg(col[3]); // Col D

                    const s1Name = clean(col[10]), s1Img = getImg(col[13]); // N
                    const s2Name = clean(col[12]), s2Img = getImg(col[16]); // Q
                    const f1Name = clean(col[14]), f1Img = getImg(col[19]); // T
                    const f2Name = clean(col[16]), f2Img = getImg(col[22]); // W
                    const d1Name = clean(col[18]), d1Img = getImg(col[25]); // Z
                    const d2Name = clean(col[20]), d2Img = getImg(col[28]); // AC

                    const renderPair = (name, img) => {
                        if (!name) return "";
                        return `<div class="rel-item">
                                    <img src="${img}" class="img-mini" onerror="this.style.display='none'">
                                    <span class="name-tag">${name}</span>
                                </div>`;
                    };

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.innerHTML = `
                        <td>
                            <div class="hero-flex">
                                <img src="${heroImg}" class="img-main" onerror="this.src='https://www.honorofkings.com/global/images/hero/hero_list_default.png'">
                                <div><span class="hero-name">${heroName}</span><span class="hero-type">${heroType}</span></div>
                            </div>
                        </td>
                        <td class="role-text">${clean(col[4])}</td>
                        <td class="role-text">${clean(col[5])}</td>
                        <td class="role-text">${clean(col[6])}</td>
                        <td><span class="stat-val">${col[7]}</span></td>
                        <td><span class="stat-val">${col[8]}</span></td>
                        <td><span class="stat-val">${col[9]}</span></td>
                        <td>${renderPair(s1Name, s1Img)}${renderPair(s2Name, s2Img)}</td>
                        <td class="blue">${renderPair(f1Name, f1Img)}${renderPair(f2Name, f2Img)}</td>
                        <td class="red">${renderPair(d1Name, d1Img)}${renderPair(d2Name, d2Img)}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error("Error:", e); }
        }
        load();
    </script>
</body>
</html>
