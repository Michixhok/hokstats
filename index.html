<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOKStats | Verificación de Datos</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #333; color: #58a6ff; text-align: left; padding: 12px; border: 1px solid #444; }
        td { padding: 10px; border: 1px solid #444; font-size: 14px; }
        tr:nth-child(even) { background: #222; }
        .img-placeholder { width: 40px; height: 40px; background: #333; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>
    <h1>HOKStats - Control de Datos</h1>
    <div id="status">Cargando datos...</div>
    
    <table id="main-table">
        <thead>
            <tr>
                <th>Héroe</th>
                <th>Tipo</th>
                <th>Rol 1</th>
                <th>Rol 2</th>
                <th>Rol 3</th>
                <th>Win Rate</th>
                <th>Pick Rate</th>
                <th>Ban Rate</th>
                <th>Sinergia</th>
                <th>Fuerte contra</th>
                <th>Débil contra</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv';

        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                // Separar filas y manejar comas dentro de textos
                const rows = data.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                
                const tableBody = document.getElementById('table-body');
                tableBody.innerHTML = '';

                // Empezamos desde la fila 1 para saltar el encabezado del CSV
                rows.slice(1).forEach((col, index) => {
                    if (!col[1]) return; // Salta filas vacías

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${col[1] || '-'}</td>  <td>${col[3] || '-'}</td>  <td>${col[4] || '-'}</td>  <td>${col[5] || '-'}</td>  <td>${col[6] || '-'}</td>  <td style="color:#58a6ff; font-weight:bold">${col[8] || '-'}</td> <td>${col[9] || '-'}</td>  <td>${col[10] || '-'}</td> <td>${col[11] || '-'}</td> <td>${col[17] || '-'}</td> <td>${col[23] || '-'}</td> `;
                    tableBody.appendChild(tr);
                });
                document.getElementById('status').innerText = "Datos sincronizados correctamente.";
            } catch (error) {
                document.getElementById('status').innerText = "Error: No se pudo conectar con el CSV.";
            }
        }

        fetchData();
    </script>
</body>
</html>
