<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOK Stats - Exact Clone</title>
    <style>
        /* COLORES COMPUTADOS DEL ARCHIVO HTML ORIGINAL */
        :root {
            --bg-body: #0e0e10;
            --bg-table-body: #171719;
            --bg-table-header: #1c1c1f;
            --border-gray: #2d2d31;
            --text-white: #f5f5f5;
            --text-gray: #9e9eb1;
            --blue-win: #5383e8;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
        }

        /* ESTRUCTURA DEL CONTENEDOR (Exacta a la clase .dark de OP.GG) */
        .table-container {
            width: 1016px; /* Ancho real del bloque central */
            margin: 0 auto;
            border: 1px solid var(--border-gray);
            border-radius: 4px;
            background-color: var(--bg-table-body);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-spacing: 0;
        }

        /* CABECERA (Extraído de la etiqueta thead de OP.GG) */
        thead {
            background-color: var(--bg-table-header);
        }

        th {
            height: 40px; /* Altura exacta del header */
            padding: 0 16px;
            color: var(--text-gray);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-gray);
            text-align: center;
        }

        /* Cuerpo de la tabla */
        tbody tr {
            background-color: var(--bg-table-body);
            transition: background-color 0.15s ease;
        }

        tbody tr:hover {
            background-color: #1c1c21; /* Hover exacto de la web */
        }

        td {
            height: 52px; /* Altura exacta de fila en OP.GG */
            padding: 0 16px;
            border-bottom: 1px solid var(--border-gray);
            font-size: 12px;
            color: var(--text-gray);
            vertical-align: middle;
            text-align: center;
        }

        /* Alineaciones específicas */
        th:first-child, td:first-child {
            text-align: left;
            width: 200px;
        }

        /* Componentes internos */
        .hero-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .img-hero {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            background-color: #2d2d31; /* Placeholder */
        }

        .hero-name {
            color: var(--text-white);
            font-weight: 700;
        }

        .win-rate {
            color: var(--blue-win);
            font-weight: 700;
        }

        /* Grupo de Iconos (Sinergias/Counters) */
        .icon-group {
            display: flex;
            justify-content: center;
            gap: 4px;
        }

        .icon-group img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid var(--border-gray);
        }
    </style>
</head>
<body>

    <div class="table-container">
        <table id="statsTable">
            <thead>
                <tr>
                    <th>Campeón</th>
                    <th>Win Rate</th>
                    <th>Pick Rate</th>
                    <th>Ban Rate</th>
                    <th>Sinergias</th>
                    <th>Counters</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv';

        async function init() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const lines = text.split('\n').slice(1);
                const tbody = document.getElementById('tableBody');

                lines.forEach(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                    if (cols.length < 5) return;

                    const [nombre, img, win, pick, ban, sin, count] = cols;

                    const row = document.createElement('tr');
                    
                    // Render de iconos pequeños
                    const getIcons = (str) => str ? str.split(/[\s,]+/).map(i => `<img src="${i}">`).join('') : '';

                    row.innerHTML = `
                        <td>
                            <div class="hero-box">
                                <img src="${img}" class="img-hero">
                                <span class="hero-name">${nombre}</span>
                            </div>
                        </td>
                        <td class="win-rate">${win}</td>
                        <td>${pick}</td>
                        <td>${ban}</td>
                        <td><div class="icon-group">${getIcons(sin)}</div></td>
                        <td><div class="icon-group">${getIcons(count)}</div></td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>
