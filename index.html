<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOKStats | v3.7 Mapeo Real</title>
    <style>
        :root { --bg: #0b0e11; --card: #161b22; --brd: #30363d; --txt: #f0f6fc; --sec: #8b949e; --acc: #58a6ff; }
        body { background: var(--bg); color: var(--txt); font-family: system-ui, sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { margin-bottom: 20px; border-left: 4px solid var(--acc); padding-left: 15px; display: flex; align-items: baseline; gap: 10px; }
        .v-badge { background: #238636; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; }
        th { color: var(--sec); font-size: 11px; text-transform: uppercase; padding: 10px; text-align: left; }

        .w-hero { width: 200px; } .w-roles { width: 110px; } .w-stat { width: 90px; } .w-rel { width: 150px; }

        tr.hero-row td { background: var(--card); padding: 12px 15px; border-top: 1px solid var(--brd); border-bottom: 1px solid var(--brd); vertical-align: middle; }
        tr.hero-row td:first-child { border-left: 1px solid var(--brd); border-radius: 8px 0 0 8px; }
        tr.hero-row td:last-child { border-right: 1px solid var(--brd); border-radius: 0 8px 8px 0; }

        .hero-info { display: flex; align-items: center; gap: 12px; }
        .img-main { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--brd); object-fit: cover; }
        .img-mini { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--brd); object-fit: cover; }
        
        .name-txt { font-weight: bold; font-size: 15px; color: #fff; display: block; }
        .type-txt { color: var(--sec); font-size: 11px; }
        .stat-txt { font-weight: 800; font-size: 14px; color: #fff; }
        .rel-list { display: flex; flex-direction: column; gap: 5px; }
        .rel-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .blue { color: var(--acc); } .red { color: #f85149; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 22px;">HOKStats</h1>
            <span class="v-badge">v3.7 Fix</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th class="w-hero">Héroe</th>
                    <th class="w-roles">Roles</th>
                    <th class="w-stat">Win Rate</th>
                    <th class="w-stat">Pick Rate</th>
                    <th class="w-stat">Ban Rate</th>
                    <th class="w-rel">Sinergias</th>
                    <th class="w-rel">Fuerte vs</th>
                    <th class="w-rel">Débil vs</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + Date.now();

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').map(line => {
                    const parts = []; let curr = '', q = false;
                    for (let c of line) { if (c === '"') q = !q; else if (c === ',' && !q) { parts.push(curr); curr = ''; } else curr += c; }
                    parts.push(curr); return parts;
                });

                const body = document.getElementById('table-body');
                rows.slice(1).forEach(row => {
                    if (!row[1]) return;

                    // MAPEADO CORREGIDO SEGÚN TUS INDICACIONES
                    const d = {
                        nombre: row[1],    // B
                        img:    row[3],    // D
                        tipo:   row[4],    // E
                        rol1:   row[5],    // F
                        rol2:   row[6],    // G
                        win:    row[8],    // I
                        pick:   row[9],    // J
                        ban:    row[10],   // K
                        s1_n:   row[11], s1_i: row[13], // L y N
                        s2_n:   row[14], s2_i: row[16], // O y Q
                        f1_n:   row[17], f1_i: row[19], // R y T
                        f2_n:   row[20], f2_i: row[22], // U y W
                        d1_n:   row[23], d1_i: row[25], // X y Z
                        d2_n:   row[26], d2_i: row[28]  // AA y AC
                    };

                    const clean = (val) => (val && !val.includes('http') && val !== "-" && val !== "0") ? val.trim() : "";
                    const img = (val) => (val && val.includes('http')) ? val.trim() : "";
                    const rel = (n, i) => n ? `<div class="rel-item"><img src="${img(i)}" class="img-mini" onerror="this.style.display='none'"><span>${clean(n)}</span></div>` : "";

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.innerHTML = `
                        <td>
                            <div class="hero-info">
                                <img src="${img(d.img)}" class="img-main" onerror="this.src='https://www.honorofkings.com/global/images/hero/hero_list_default.png'">
                                <div><span class="name-txt">${d.nombre}</span><span class="type-txt">${clean(d.tipo)}</span></div>
                            </div>
                        </td>
                        <td><div class="type-txt">${clean(d.rol1)}<br>${clean(d.rol2)}</div></td>
                        <td><span class="stat-txt">${clean(d.win)}</span></td>
                        <td><span class="stat-txt">${clean(d.pick)}</span></td>
                        <td><span class="stat-txt">${clean(d.ban)}</span></td>
                        <td><div class="rel-list">${rel(d.s1_n, d.s1_i)}${rel(d.s2_n, d.s2_i)}</div></td>
                        <td class="blue"><div class="rel-list">${rel(d.f1_n, d.f1_i)}${rel(d.f2_n, d.f2_i)}</div></td>
                        <td class="red"><div class="rel-list">${rel(d.d1_n, d.d1_i)}${rel(d.d2_n, d.d2_i)}</div></td>
                    `;
                    body.appendChild(tr);
                });
            } catch (e) { console.error(e); }
        }
        load();
    </script>
</body>
</html>
