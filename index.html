<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List HoK</title>

<style>
body {
  background: #1c1c1f;
  font-family: Arial, sans-serif;
  color: #7b7a8e;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
  border-radius: 8px;
  overflow: hidden;
}

/* TABS */
.tabs {
  display: flex;
  background: #31313c;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 12px;
}

.tab.active {
  background: #4f6edb;
  color: white;
  font-weight: bold;
}

/* TABLA */
table {
  width: 100%;
  border-collapse: collapse;
}

/* HEADER */
thead {
  background: #282830;
}

th {
  padding: 10px;
  font-size: 13px;
  text-align: left;
  color: #7b7a8e;
}

/* FILAS */
tbody tr {
  background: #31313c;
  border-top: 1px solid #282830;
}

tbody tr:hover {
  background: #3a3a46;
}

td {
  padding: 10px;
}

/* COLUMNAS */
.rank {
  width: 40px;
  text-align: center;
}

.champion {
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
}

.champion img {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  object-fit: cover;
}

/* TIER */
.tier-badge {
  background: #2f80ed;
  color: white;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 6px;
  text-align: center;
  width: 24px;
  margin: auto;
}

/* STATS */
.stat {
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active">Todo</div>
    <div class="tab">Top</div>
    <div class="tab">Jungla</div>
    <div class="tab">Mid</div>
    <div class="tab">Bot</div>
    <div class="tab">Soporte</div>
  </div>

  <!-- TABLA -->
  <table>
    <thead>
      <tr>
        <th class="rank">#</th>
        <th>Héroe</th>
        <th class="stat">Tier</th>
        <th class="stat">Rol</th>
        <th class="stat">Win Rate</th>
        <th class="stat">Pick Rate</th>
        <th class="stat">Ban Rate</th>
      </tr>
    </thead>

    <!-- IMPORTANTE: vacío -->
    <tbody></tbody>
  </table>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv";

fetch(CSV_URL)
  .then(res => res.text())
  .then(csv => {

    const rows = csv.split("\n").slice(1);
    const tbody = document.querySelector("tbody");

    rows.forEach((row, index) => {

      if (!row.trim()) return;

      const cols = row.split(",");

      const nombre = cols[1];
      const imagen = cols[3];
      const win = cols[8];
      const pick = cols[9];
      const ban = cols[10];

      if (!nombre) return;

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td class="rank">${index + 1}</td>

        <td>
          <div class="champion">
            <img src="${imagen}" onerror="this.style.display='none'">
            <span>${nombre}</span>
          </div>
        </td>

        <td class="stat"><div class="tier-badge">1</div></td>

        <td class="stat">-</td>

        <td class="stat">${win}</td>
        <td class="stat">${pick}</td>
        <td class="stat">${ban}</td>
      `;

      tbody.appendChild(tr);
    });

  })
  .catch(err => {
    console.error("Error cargando CSV:", err);
  });
</script>

</body>
</html>
