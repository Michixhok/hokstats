<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HOKStats | v3.0</title>
    <style>
        :root {
            --bg-body: #0b0e11;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-sec: #8b949e;
            --accent: #58a6ff;
        }

        body { 
            background: var(--bg-body); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            padding: 40px;
            margin: 0;
        }

        .container { max-width: 1450px; margin: 0 auto; }

        .header-section { 
            margin-bottom: 30px; 
            border-left: 4px solid var(--accent); 
            padding-left: 15px;
            display: flex;
            align-items: baseline;
            gap: 15px;
        }
        .version-badge {
            background: #238636;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; table-layout: fixed; }
        
        th { 
            color: var(--text-sec); 
            font-size: 11px; 
            text-transform: uppercase; 
            padding: 10px 20px;
            font-weight: 600;
            text-align: left;
        }

        .col-hero { width: 16%; }
        .col-role { width: 8%; }
        .col-stat { width: 9%; }
        .col-pair { width: 13%; }

        tr.hero-row td {
            background: var(--bg-card);
            padding: 18px 20px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr.hero-row td:first-child { border-left: 1px solid var(--border); border-radius: 8px 0 0 8px; }
        tr.hero-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 8px 8px 0; }

        .hero-name { font-weight: bold; font-size: 15px; color: #fff; display: block; margin-bottom: 2px; }
        .hero-type { color: var(--text-sec); font-size: 11px; }

        /* Estilo para roles: más pequeños */
        .role-text { color: var(--text-sec); font-size: 11px; }

        /* Estilo unificado para números: Blanco y negrita */
        .stat-val { font-weight: 700; font-size: 15px; color: #fff; }

        .pair-item { display: block; font-size: 12px; margin-bottom: 2px; }
        .blue { color: var(--accent); }
        .red { color: #f85149; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1 style="margin:0; font-size: 24px;">HOKStats</h1>
            <span class="version-badge">Build v3.0</span>
            <span style="color: var(--text-sec); font-size: 14px;">| Meta Database Chile</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="col-hero">Héroe / Tipo</th>
                    <th class="col-role">Rol 1</th>
                    <th class="col-role">Rol 2</th>
                    <th class="col-role">Rol 3</th>
                    <th class="col-stat">Win Rate</th>
                    <th class="col-stat">Pick Rate</th>
                    <th class="col-stat">Ban Rate</th>
                    <th class="col-pair">Sinergias</th>
                    <th class="col-pair">Fuerte vs</th>
                    <th class="col-pair">Débil vs</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4rMY_drrjKMx3KTdjAaSrH6GenxyZ7YzLPT7oiZ_pNYm6EKG-yJPfmbRcZgYGGi2gERA1Gciw-Fy/pub?gid=538223640&single=true&output=csv&cache=' + new Date().getTime();

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                const tableBody = document.getElementById('table-body');
                
                rows.slice(1).forEach(col => {
                    if (!col[1] || col[1].trim() === "") return;
                    const clean = (v) => (v && v.trim() !== "-" && v.trim() !== "" && v.trim() !== "0.00%") ? v.replace(/"/g, '') : "";

                    const tr = document.createElement('tr');
                    tr.className = 'hero-row';
                    tr.innerHTML = `
                        <td>
                            <span class="hero-name">${col[1]}</span>
                            <span class="hero-type">${col[3]}</span>
                        </td>
                        <td class="role-text">${clean(col[4])}</td>
                        <td class="role-text">${clean(col[5])}</td>
                        <td class="role-text">${clean(col[6])}</td>
                        <td><span class="stat-val">${col[7]}</span></td>
                        <td><span class="stat-val">${col[8]}</span></td>
                        <td><span class="stat-val">${col[9]}</span></td>
                        <td>
                            <span class="pair-item">${clean(col[10])}</span>
                            <span class="pair-item">${clean(col[12])}</span>
                        </td>
                        <td class="blue">
                            <span class="pair-item">${clean(col[14])}</span>
                            <span class="pair-item">${clean(col[16])}</span>
                        </td>
                        <td class="red">
                            <span class="pair-item">${clean(col[18])}</span>
                            <span class="pair-item">${clean(col[20])}</span>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error("Error:", e); }
        }
        load();
    </script>
</body>
</html>
